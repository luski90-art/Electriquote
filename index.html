<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectriQuote Pro - Edición Corregida</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s; }
        .active-tab { color: #0f172a; border-top: 3px solid #0f172a; background: #f1f5f9; }
        .dark .active-tab { color: #f8fafc; border-top: 3px solid #38bdf8; background: #1e293b; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        .dark .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen pb-24 text-slate-800 bg-slate-50 dark:bg-darkBg dark:text-slate-100">

<!-- PANTALLA DE ACCESO -->
<div id="auth-screen" class="fixed inset-0 bg-slate-900 z-[999] flex flex-col items-center justify-center p-4">
    <div class="bg-white dark:bg-darkCard w-full max-w-sm rounded-[2.5rem] shadow-2xl p-10 fade-in text-center">
        <div class="bg-slate-900 dark:bg-blue-600 w-16 h-16 rounded-2xl text-white flex items-center justify-center mx-auto mb-6">
            <i data-lucide="lock" class="w-8 h-8"></i>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white">Acceso Privado</h2>
        <p class="text-slate-500 text-sm mt-2 mb-8">Sistema de Presupuestos</p>
        
        <div class="space-y-3">
            <input id="usr-fld" type="email" autocomplete="off" placeholder="Email" class="w-full p-4 border border-slate-200 dark:border-slate-700 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 ring-slate-900 transition-all">
            <input id="key-fld" type="password" autocomplete="off" placeholder="Contraseña" class="w-full p-4 border border-slate-200 dark:border-slate-700 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 ring-slate-900 transition-all">
        </div>
        
        <p id="auth-error-msg" class="text-red-500 text-xs mt-4 font-bold hidden"></p>

        <div class="flex flex-col gap-3 mt-6">
            <button onclick="window.processAuth()" class="w-full py-4 bg-slate-900 dark:bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-slate-800 flex items-center justify-center gap-2">
                <span>Entrar al Panel</span>
            </button>
        </div>
    </div>
</div>

<!-- CABECERA -->
<header class="bg-white dark:bg-darkCard border-b border-slate-200 dark:border-slate-800 p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-3">
        <div class="bg-slate-900 dark:bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="zap" class="w-5 h-5"></i></div>
        <h1 class="text-lg font-black text-slate-900 dark:text-white uppercase tracking-tight">ELECTRIQUOTE</h1>
    </div>
    <div class="flex items-center gap-2">
        <button onclick="window.toggleDarkMode()" class="p-2 text-slate-400 hover:text-blue-500 transition-colors">
            <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
        </button>
        <button onclick="window.doLogout()" class="p-2 text-slate-400 hover:text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-300"></div>
    </div>
</header>

<main class="max-w-4xl mx-auto p-4">
    <!-- FILTROS -->
    <div id="search-bar" class="mb-6 flex gap-2">
        <div class="relative flex-1">
            <i data-lucide="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input id="main-search" oninput="window.applyFilters()" type="text" placeholder="Buscar..." class="w-full pl-11 pr-4 py-3 bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm outline-none focus:ring-2 ring-blue-500">
        </div>
        <select id="status-filter" onchange="window.applyFilters()" class="px-4 py-3 bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm outline-none text-sm font-bold">
            <option value="todos">Todos</option>
            <option value="pendiente">Pendientes</option>
            <option value="aprobado">Aprobados</option>
            <option value="rechazado">Rechazados</option>
        </select>
    </div>

    <!-- VISTAS -->
    <section id="view-quotes" class="space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold">Proyectos</h2>
            <div class="flex gap-2">
                <button onclick="window.openTemplateModal()" class="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-4 py-3 rounded-xl font-bold flex items-center gap-2 text-sm"><i data-lucide="layers" class="w-4 h-4"></i> Plantillas</button>
                <button onclick="window.openQuoteModal()" class="bg-slate-900 dark:bg-blue-600 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg"><i data-lucide="plus"></i> Nuevo</button>
            </div>
        </div>
        <div id="quotes-list" class="grid gap-4"></div>
    </section>

    <section id="view-materials" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold">Catálogo</h2>
            <button onclick="window.openMaterialModal()" class="bg-slate-900 dark:bg-blue-600 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2"><i data-lucide="plus"></i> Añadir</button>
        </div>
        <div id="materials-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>

    <section id="view-clients" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold">Clientes</h2>
            <button onclick="window.openClientModal()" class="bg-slate-900 dark:bg-blue-600 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2"><i data-lucide="user-plus"></i> Nuevo</button>
        </div>
        <div id="clients-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-darkCard border-t border-slate-200 dark:border-slate-800 flex justify-around items-center h-20 z-40 shadow-lg">
    <button onclick="window.switchView('quotes')" id="nav-quotes" class="flex-1 flex flex-col items-center justify-center active-tab h-full">
        <i data-lucide="layout-grid" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold uppercase">Proyectos</span>
    </button>
    <button onclick="window.switchView('materials')" id="nav-materials" class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full">
        <i data-lucide="package" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold uppercase">Catálogo</span>
    </button>
    <button onclick="window.switchView('clients')" id="nav-clients" class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full">
        <i data-lucide="users" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold uppercase">Clientes</span>
    </button>
</nav>

<!-- MODALES (CLIENTE, MATERIAL, PRESUPUESTO) -->
<div id="modal-client" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[100]">
    <div class="bg-white dark:bg-darkCard w-full max-w-sm rounded-[1.5rem] p-6 space-y-4 shadow-2xl">
        <h3 class="font-black text-xl" id="client-title-modal">Cliente</h3>
        <input id="cl-name" placeholder="Nombre" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        <input id="cl-phone" placeholder="Teléfono" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        <input id="cl-nif" placeholder="NIF / CIF" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        <input id="cl-address" placeholder="Dirección" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        <input id="cl-city" placeholder="Ciudad" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        <button onclick="window.saveClientData()" class="w-full py-4 bg-slate-900 dark:bg-blue-600 text-white font-bold rounded-xl">Guardar</button>
        <button onclick="window.closeAllModals()" class="w-full text-slate-400 text-sm">Cerrar</button>
    </div>
</div>

<div id="modal-material" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[100]">
    <div class="bg-white dark:bg-darkCard w-full max-w-sm rounded-[1.5rem] p-6 space-y-4">
        <h3 class="font-black text-xl" id="mat-title-modal">Concepto</h3>
        <input id="mt-name" placeholder="Nombre" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        <div class="grid grid-cols-2 gap-2">
            <input id="mt-price" type="number" step="0.01" placeholder="P. Venta €" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
            <input id="mt-cost" type="number" step="0.01" placeholder="Costo €" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        </div>
        <button onclick="window.saveMaterialData()" class="w-full py-4 bg-slate-900 dark:bg-blue-600 text-white font-bold rounded-xl">Guardar</button>
        <button onclick="window.closeAllModals()" class="w-full text-slate-400 text-sm">Cerrar</button>
    </div>
</div>

<div id="modal-quote" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[100]">
    <div class="bg-white dark:bg-darkCard w-full max-w-xl rounded-[2rem] overflow-hidden flex flex-col max-h-[85vh] shadow-2xl">
        <div class="p-6 border-b dark:border-slate-700 bg-slate-50 dark:bg-slate-800 flex justify-between items-center">
            <h3 id="quote-title-modal" class="font-black text-xl">Presupuesto</h3>
            <button onclick="window.closeAllModals()"><i data-lucide="x"></i></button>
        </div>
        <div class="p-6 overflow-y-auto space-y-4 flex-1">
            <input id="q-ref" placeholder="Referencia Proyecto (Obligatorio)" class="w-full p-4 border dark:border-slate-700 dark:bg-slate-800 rounded-xl font-bold">
            <div class="flex gap-2">
                <select id="q-cl-select" class="flex-1 p-4 border dark:border-slate-700 dark:bg-slate-800 rounded-xl"></select>
                <select id="q-status" class="w-1/3 p-4 border dark:border-slate-700 dark:bg-slate-800 rounded-xl font-semibold text-sm">
                    <option value="pendiente">Pendiente</option>
                    <option value="aprobado">Aprobado</option>
                    <option value="rechazado">Rechazado</option>
                </select>
            </div>
            
            <div class="flex gap-2 items-center bg-blue-50 dark:bg-blue-900/20 p-3 rounded-xl">
                <i data-lucide="percent" class="w-4 h-4 text-blue-500"></i>
                <span class="text-sm font-bold flex-1">Aplicar IVA:</span>
                <select id="q-iva" onchange="window.renderQuoteList()" class="p-2 border rounded-lg dark:bg-slate-800">
                    <option value="0">Sin IVA</option>
                    <option value="10">10%</option>
                    <option value="21" selected>21%</option>
                </select>
            </div>

            <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border dark:border-slate-700">
                <div class="flex flex-col gap-2 mb-4">
                    <div class="flex gap-2">
                        <select id="q-mt-select" class="flex-1 p-3 border dark:border-slate-700 dark:bg-slate-800 rounded-xl text-sm"></select>
                        <input id="q-mt-qty" type="number" value="1" class="w-16 p-3 border dark:border-slate-700 dark:bg-slate-800 rounded-xl text-center">
                        <button onclick="window.addItemToQuote()" class="bg-slate-900 dark:bg-blue-600 text-white px-4 rounded-xl shadow-md"><i data-lucide="plus"></i></button>
                    </div>
                </div>
                
                <ul id="q-items-list" class="space-y-2 mb-4"></ul>
                
                <div class="pt-4 border-t dark:border-slate-700 space-y-1">
                    <div class="flex justify-between text-xs font-bold text-slate-400">
                        <span>SUBTOTAL</span>
                        <span id="q-subtotal-val">0.00 €</span>
                    </div>
                    <!-- CONTENEDOR IVA DINÁMICO -->
                    <div id="q-iva-container" class="flex justify-between text-xs font-bold text-slate-400">
                        <span>IVA</span>
                        <span id="q-iva-val">0.00 €</span>
                    </div>
                    <div class="flex justify-between font-black text-lg pt-2 border-t dark:border-slate-700">
                        <span>TOTAL</span>
                        <span id="q-total-val">0.00 €</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="p-6 border-t dark:border-slate-700">
            <button onclick="window.saveFinalQuote()" class="w-full py-4 bg-slate-900 dark:bg-blue-600 text-white font-bold rounded-xl text-lg uppercase tracking-wider">Guardar Presupuesto</button>
        </div>
    </div>
</div>

<!-- MODAL PLANTILLAS -->
<div id="modal-template" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[110]">
    <div class="bg-white dark:bg-darkCard w-full max-w-sm rounded-[1.5rem] p-6 space-y-4">
        <h3 class="font-black text-xl">Plantillas</h3>
        <input id="tp-name" placeholder="Nombre Plantilla" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        <button onclick="window.saveCurrentAsTemplate()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl text-sm">Crear desde Presupuesto Actual</button>
        <div id="templates-list-ui" class="space-y-2 pt-4 border-t dark:border-slate-700 max-h-40 overflow-y-auto text-xs"></div>
        <button onclick="window.closeAllModals()" class="w-full text-slate-400 text-sm">Cerrar</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBuX9O3WBR5zX_L-WYdRiwirBl50aUFzlg",
    authDomain: "electriquote-b92c3.firebaseapp.com",
    projectId: "electriquote-b92c3",
    storageBucket: "electriquote-b92c3.firebasestorage.app",
    messagingSenderId: "1050154424016",
    appId: "1:1050154424016:web:10e5250c9b78c17bb7b0d5"
};

const appId = 'electri-pro-final'; 
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

setPersistence(auth, browserLocalPersistence);

let user = null;
window.data = { clients: [], materials: [], quotes: [], templates: [] };
window.tempItems = [];
window.editingId = null;
window.dbListeners = [];

// AUTH LISTENER
onAuthStateChanged(auth, u => {
    user = u;
    const authScr = document.getElementById('auth-screen');
    if(u) {
        authScr.classList.add('hidden');
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]";
        setupSync();
    } else {
        authScr.classList.remove('hidden');
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-slate-300";
        window.dbListeners.forEach(l => l());
        window.dbListeners = [];
    }
});

function setupSync() {
    window.dbListeners = [
        syncCol('clients', renderCls),
        syncCol('materials', renderMats),
        syncCol('quotes', renderQts),
        syncCol('templates', () => {})
    ];
}

const syncCol = (name, cb) => {
    const c = collection(db, 'artifacts', appId, 'users', user.uid, name);
    return onSnapshot(c, s => {
        window.data[name] = s.docs.map(d => ({id: d.id, ...d.data()}));
        cb();
    });
};

// ACTIONS
window.processAuth = async () => {
    const email = document.getElementById('usr-fld').value.trim();
    const pass = document.getElementById('key-fld').value.trim();
    const err = document.getElementById('auth-error-msg');
    try {
        await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
        err.innerText = "Error de acceso"; err.classList.remove('hidden');
    }
};

window.doLogout = () => signOut(auth);

window.switchView = (v) => {
    ['quotes','materials','clients'].forEach(x => {
        document.getElementById('view-'+x).classList.add('hidden');
        document.getElementById('nav-'+x).className = "flex-1 flex flex-col items-center justify-center text-slate-400 h-full";
    });
    document.getElementById('view-'+v).classList.remove('hidden');
    document.getElementById('nav-'+v).className = "flex-1 flex flex-col items-center justify-center active-tab h-full";
};

window.closeAllModals = () => {
    document.querySelectorAll('[id^="modal-"]').forEach(m => m.classList.replace('flex','hidden'));
    window.editingId = null;
};

// RENDERERS
function renderCls() {
    const list = document.getElementById('clients-list');
    list.innerHTML = window.data.clients.map(c => `
        <div onclick="window.openClientModal('${c.id}')" class="bg-white dark:bg-darkCard p-4 rounded-xl border dark:border-slate-700 flex justify-between items-center cursor-pointer">
            <div><b class="uppercase">${c.name}</b><p class="text-xs text-slate-400">${c.phone}</p></div>
            <button onclick="window.delItem('clients','${c.id}',event)" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>
    `).join('');
    lucide.createIcons();
}

function renderMats() {
    const list = document.getElementById('materials-list');
    list.innerHTML = window.data.materials.map(m => `
        <div onclick="window.openMaterialModal('${m.id}')" class="bg-white dark:bg-darkCard p-4 rounded-xl border dark:border-slate-700 flex justify-between items-center cursor-pointer">
            <div><b>${m.name}</b><p class="text-xs text-slate-400">${m.price.toFixed(2)}€</p></div>
            <button onclick="window.delItem('materials','${m.id}',event)" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>
    `).join('');
    lucide.createIcons();
}

function renderQts() {
    const list = document.getElementById('quotes-list');
    const filter = document.getElementById('status-filter').value;
    const filtered = filter === 'todos' ? window.data.quotes : window.data.quotes.filter(q => q.status === filter);

    list.innerHTML = filtered.map(q => {
        const client = window.data.clients.find(c => c.id === q.clientId)?.name || 'Desconocido';
        return `
            <div onclick="window.openQuoteModal('${q.id}')" class="bg-white dark:bg-darkCard p-5 rounded-2xl border dark:border-slate-700 cursor-pointer hover:border-blue-500 transition-all">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-[10px] font-bold px-2 py-1 bg-slate-100 dark:bg-slate-800 rounded uppercase tracking-widest">${q.status}</span>
                    <b class="text-lg">${q.total.toFixed(2)}€</b>
                </div>
                <h4 class="font-bold text-slate-900 dark:text-white">${q.ref}</h4>
                <p class="text-xs text-slate-400 uppercase">${client}</p>
            </div>
        `;
    }).join('');
    lucide.createIcons();
}

// LOGICA PRESUPUESTO
window.openQuoteModal = (id = null) => {
    if(window.data.clients.length === 0) { alert("Primero crea un cliente"); return; }
    window.editingId = id;
    document.getElementById('q-cl-select').innerHTML = window.data.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    document.getElementById('q-mt-select').innerHTML = window.data.materials.map(m => `<option value="${m.id}">${m.name} (${m.price.toFixed(2)}€)</option>`).join('');
    
    if(id) {
        const q = window.data.quotes.find(x => x.id === id);
        document.getElementById('q-ref').value = q.ref;
        document.getElementById('q-cl-select').value = q.clientId;
        document.getElementById('q-status').value = q.status;
        document.getElementById('q-iva').value = q.iva || "21";
        window.tempItems = [...q.items];
    } else {
        window.tempItems = [];
        document.getElementById('q-ref').value = "";
    }
    window.renderQuoteList();
    document.getElementById('modal-quote').classList.replace('hidden', 'flex');
};

window.addItemToQuote = () => {
    const mid = document.getElementById('q-mt-select').value;
    const qty = parseFloat(document.getElementById('q-mt-qty').value) || 1;
    const m = window.data.materials.find(x => x.id === mid);
    if(m) {
        window.tempItems.push({...m, qty, sub: m.price * qty});
        window.renderQuoteList();
    }
};

window.renderQuoteList = () => {
    const list = document.getElementById('q-items-list');
    const ivaPerc = parseInt(document.getElementById('q-iva').value);
    let subtotal = 0;
    
    list.innerHTML = window.tempItems.map((it, i) => {
        subtotal += it.sub;
        return `<li class="flex justify-between p-2 bg-white dark:bg-slate-700 rounded border dark:border-slate-600 text-xs">
            <span>${it.qty} x ${it.name}</span>
            <div class="flex gap-2 items-center">
                <b>${it.sub.toFixed(2)}€</b>
                <button onclick="window.removeTempItem(${i})" class="text-red-400"><i data-lucide="minus-circle" class="w-3 h-3"></i></button>
            </div>
        </li>`;
    }).join('');
    
    const ivaVal = subtotal * (ivaPerc / 100);
    const total = subtotal + ivaVal;

    document.getElementById('q-subtotal-val').innerText = subtotal.toFixed(2) + " €";
    document.getElementById('q-iva-val').innerText = ivaVal.toFixed(2) + " €";
    document.getElementById('q-total-val').innerText = total.toFixed(2) + " €";
    
    // MEJORA: OCULTAR IVA SI ES 0%
    const ivaRow = document.getElementById('q-iva-container');
    if (ivaRow) ivaRow.style.display = ivaPerc > 0 ? 'flex' : 'none';

    lucide.createIcons();
};

window.removeTempItem = (i) => { window.tempItems.splice(i,1); window.renderQuoteList(); };

// MEJORA: GUARDADO CON ALERTAS
window.saveFinalQuote = async () => {
    const ref = document.getElementById('q-ref').value.trim();
    const cid = document.getElementById('q-cl-select').value;
    const status = document.getElementById('q-status').value;
    const iva = document.getElementById('q-iva').value;
    
    if(!ref) { alert("¡Falta la referencia! Debes dar un nombre al proyecto."); return; }
    if(window.tempItems.length === 0) { alert("¡Presupuesto vacío! Añade al menos un concepto del catálogo."); return; }
    
    const subtotal = window.tempItems.reduce((a,b)=>a+b.sub,0);
    const total = subtotal * (1 + (parseInt(iva)/100));
    const cRef = collection(db, 'artifacts', appId, 'users', user.uid, 'quotes');
    
    const d = { ref, clientId: cid, status, iva, items: window.tempItems, subtotal, total, up: serverTimestamp() };
    
    try {
        if(window.editingId) await updateDoc(doc(cRef, window.editingId), d);
        else await addDoc(cRef, d);
        window.closeAllModals();
    } catch (e) {
        alert("Error al guardar en la base de datos.");
    }
};

// CRUD BASICO CLIENTES/MATERIALES
window.saveClientData = async () => {
    const name = document.getElementById('cl-name').value;
    if(!name) return;
    const c = collection(db, 'artifacts', appId, 'users', user.uid, 'clients');
    const d = { name, phone: document.getElementById('cl-phone').value, nif: document.getElementById('cl-nif').value, up: serverTimestamp() };
    if(window.editingId) await updateDoc(doc(c, window.editingId), d);
    else await addDoc(c, d);
    window.closeAllModals();
};

window.saveMaterialData = async () => {
    const name = document.getElementById('mt-name').value;
    if(!name) return;
    const c = collection(db, 'artifacts', appId, 'users', user.uid, 'materials');
    const price = parseFloat(document.getElementById('mt-price').value) || 0;
    const d = { name, price, cost: parseFloat(document.getElementById('mt-cost').value)||0, up: serverTimestamp() };
    if(window.editingId) await updateDoc(doc(c, window.editingId), d);
    else await addDoc(c, d);
    window.closeAllModals();
};

window.delItem = async (col, id, e) => {
    e.stopPropagation();
    if(confirm("¿Seguro que quieres eliminar?")) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, col, id));
};

// THEME
window.toggleDarkMode = () => {
    document.documentElement.classList.toggle('dark');
    const isDark = document.documentElement.classList.contains('dark');
    document.getElementById('theme-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
    lucide.createIcons();
};

window.applyFilters = () => { renderCls(); renderMats(); renderQts(); };

lucide.createIcons();
</script>
</body>
</html>
