<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectriQuote Pro - FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10">

<h1 class="text-2xl font-bold mb-4">ElectriQuote FIX TEST</h1>

<button id="btnSave" class="bg-blue-600 text-white px-4 py-2 rounded">Guardar prueba</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

// 🔥 PON AQUÍ TU CONFIG REAL
const firebaseConfig = {
    apiKey: "AIzaSyBuX9O3WBR5zX_L-WYdRiwirBl50aUFzlg",
    authDomain: "electriquote-b92c3.firebaseapp.com",
    projectId: "electriquote-b92c3",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

await signInAnonymously(auth);

async function testSave() {
    try {
        await addDoc(collection(db, "test"), {
            ok: true,
            time: Date.now()
        });
        alert("GUARDADO OK");
    } catch (e) {
        console.error(e);
        alert("ERROR AL GUARDAR");
    }
}

// 🔥 SOLUCIÓN: eventListener en vez de onclick
const btn = document.getElementById("btnSave");
btn.addEventListener("click", testSave);

</script>

</body>
</html>
