<script type="module">

// =============================
// FIX 1: openQuoteModal (TEMPLATE STRINGS)
// =============================
window.openQuoteModal = (id = null) => {
    if(window.data.clients.length === 0) { alert("Primero crea un cliente."); return; }
    window.editingId = id;

    document.getElementById('q-cl-select').innerHTML =
        window.data.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

    document.getElementById('q-mt-select').innerHTML =
        window.data.materials.map(m => `<option value="${m.id}">${m.name} (${m.price.toFixed(2)}€)</option>`).join('');

    document.getElementById('q-tp-select').innerHTML =
        '<option value="">Cargar Pack...</option>' +
        window.data.templates.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

    if(id) {
        const q = window.data.quotes.find(x => x.id === id);
        document.getElementById('q-ref').value = q.ref;
        document.getElementById('q-cl-select').value = q.clientId;
        document.getElementById('q-status').value = q.status || 'pendiente';
        document.getElementById('q-iva').value = q.iva || "21";
        window.tempItems = [...q.items];
    } else {
        window.tempItems = [];
        document.getElementById('q-ref').value = "";
        document.getElementById('q-iva').value = "21";
    }

    window.renderQuoteList();
    document.getElementById('modal-quote').classList.replace('hidden', 'flex');
};


// =============================
// FIX 2: renderQuoteList (LI TEMPLATE)
// =============================
window.renderQuoteList = () => {
    const list = document.getElementById('q-items-list');
    const ivaPerc = parseInt(document.getElementById('q-iva').value);
    let subtotal = 0;
    let totalCost = 0;

    list.innerHTML = window.tempItems.map((it, i) => {
        subtotal += it.sub;
        totalCost += (it.totalCost || 0);

        return `<li class="flex justify-between p-2 bg-white dark:bg-slate-700 rounded border dark:border-slate-600 text-sm">
            <span>${it.qty} x ${it.name}</span>
            <div class="flex gap-2 items-center">
                <b>${it.sub.toFixed(2)}€</b>
                <button onclick="window.removeTempItem(${i})" class="text-red-400">
                    <i data-lucide="minus-circle" class="w-4 h-4"></i>
                </button>
            </div>
        </li>`;
    }).join('');

    const ivaVal = subtotal * (ivaPerc / 100);
    const total = subtotal + ivaVal;
    const profit = subtotal - totalCost;

    document.getElementById('q-subtotal-val').innerText = subtotal.toFixed(2) + " €";
    document.getElementById('q-iva-val').innerText = ivaVal.toFixed(2) + " €";
    document.getElementById('q-total-val').innerText = total.toFixed(2) + " €";
    document.getElementById('q-profit-val').innerText = profit.toFixed(2) + " €";

    lucide.createIcons();
};


// =============================
// FIX 3: renderQts (RETURN TEMPLATE)
// =============================
const renderQts = () => {
    const search = document.getElementById('main-search').value.toLowerCase();
    const statusFilter = document.getElementById('status-filter').value;

    let filtered = window.data.quotes.filter(q => q.ref.toLowerCase().includes(search));
    if(statusFilter !== 'todos') filtered = filtered.filter(q => q.status === statusFilter);

    const list = document.getElementById('quotes-list');

    if(filtered.length === 0) {
        list.innerHTML = `<div class="p-8 text-center text-slate-400 font-bold">No hay proyectos</div>`;
        return;
    }

    list.innerHTML = filtered.map(q => {
        const client = window.data.clients.find(c => c.id === q.clientId) || {name: 'Cliente Eliminado'};
        const colors = { pendiente: 'text-amber-500 bg-amber-50', aprobado: 'text-emerald-500 bg-emerald-50', rechazado: 'text-red-500 bg-red-50' };
        const darkColors = { pendiente: 'dark:bg-amber-500/10', aprobado: 'dark:bg-emerald-500/10', rechazado: 'dark:bg-red-500/10' };

        return `
        <div class="bg-white dark:bg-darkCard p-4 rounded-2xl border dark:border-slate-700 shadow-sm flex flex-col gap-3 cursor-pointer hover:border-blue-400" onclick="window.openQuoteModal('${q.id}')">
            <div class="flex justify-between items-start">
                <div>
                    <span class="text-xs font-black text-slate-400 tracking-wider">REF: ${q.ref}</span>
                    <h4 class="font-bold text-lg leading-tight uppercase">${client.name}</h4>
                </div>
                <span class="text-[10px] font-black uppercase px-2 py-1 rounded-md ${colors[q.status || 'pendiente']} ${darkColors[q.status || 'pendiente']}">${q.status || 'Pendiente'}</span>
            </div>
            <div class="flex justify-between items-end border-t dark:border-slate-700 pt-3">
                <span class="font-black text-xl">${(q.total || 0).toFixed(2)} €</span>
                <div class="flex gap-2">
                    <button onclick="window.generatePDF('${q.id}', event)" class="p-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 rounded-lg"><i data-lucide="file-text" class="w-4 h-4"></i></button>
                    <button onclick="window.delItem('quotes','${q.id}', event)" class="p-2 bg-red-50 dark:bg-red-900/30 text-red-600 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            </div>
        </div>`;
    }).join('');

    lucide.createIcons();
};


// =============================
// FIX 4: IVA SOLO SI > 0 (PDF)
// =============================
const ivaPercent = parseInt(q.iva || 0);
const ivaVal = (q.subtotal * (ivaPercent / 100)).toFixed(2);

doc.text("Subtotal: " + (q.subtotal || 0).toFixed(2) + " €", 140, finalY);

let offset = 6;
if(ivaPercent > 0) {
    doc.text(`IVA (${ivaPercent}%): ` + ivaVal + " €", 140, finalY + offset);
    offset += 8;
}

doc.setFontSize(12);
doc.setFont("helvetica", "bold");
doc.text("TOTAL: " + (q.total || 0).toFixed(2) + " €", 140, finalY + offset);


// =============================
// FIX 5: PDF errores string
// =============================
doc.save(`Presupuesto_${q.ref}.pdf`);

pdfWindow.document.write(`<iframe width='100%' height='100%' src='${pdfDataUri}'></iframe>`);

</script>
