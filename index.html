<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectriQuote Pro - Gestión Profesional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
        }
        .active-tab { 
            color: #0f172a; 
            border-top: 3px solid #0f172a; 
            background: #f1f5f9; 
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0f172a;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #pdf-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="min-h-screen pb-24 text-slate-800">

<!-- PANTALLA DE ACCESO SEGURO (AUTH) -->
<div id="auth-screen" class="fixed inset-0 bg-slate-900 z-[999] flex flex-col items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden p-10 fade-in text-center flex flex-col items-center">
        <div class="bg-slate-900 w-20 h-20 rounded-2xl text-white flex items-center justify-center mb-6 shadow-xl">
            <i data-lucide="shield-check" class="w-10 h-10"></i>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">ELECTRI<span class="text-slate-500">QUOTE</span></h2>
        <p class="text-slate-500 text-sm mt-2 mb-8">Estableciendo conexión segura...</p>
        <div class="loader"></div>
    </div>
</div>

<header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-3">
        <div class="bg-slate-900 p-2 rounded-lg text-white">
            <i data-lucide="zap" class="w-5 h-5"></i>
        </div>
        <h1 class="text-lg font-black tracking-tighter text-slate-900">ELECTRI<span class="text-slate-500">QUOTE</span></h1>
    </div>
    <div class="flex items-center gap-2">
        <div id="sync-indicator" class="w-2 h-2 rounded-full bg-slate-400"></div>
        <button onclick="window.logout()" class="text-slate-400 hover:text-red-500 p-2 rounded-xl bg-slate-50 transition-colors">
            <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
    </div>
</header>

<main class="max-w-4xl mx-auto p-4 md:p-6">
    <!-- VISTA: PRESUPUESTOS -->
    <section id="view-quotes" class="space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold text-slate-900">Proyectos</h2>
            <button onclick="window.openQuoteModal()" class="bg-slate-900 text-white px-5 py-3 rounded-xl font-bold shadow-lg hover:bg-slate-800 transition-colors flex items-center gap-2">
                <i data-lucide="plus" class="w-5 h-5"></i> Nuevo
            </button>
        </div>
        <div id="quotes-list" class="grid gap-4"></div>
    </section>

    <!-- VISTA: MATERIALES -->
    <section id="view-materials" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold text-slate-900">Catálogo</h2>
            <button onclick="window.openMaterialModal()" class="bg-slate-900 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2">
                <i data-lucide="plus" class="w-5 h-5"></i> Añadir
            </button>
        </div>
        <div id="materials-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>

    <!-- VISTA: CLIENTES -->
    <section id="view-clients" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold text-slate-900">Clientes</h2>
            <button onclick="window.openClientModal()" class="bg-slate-900 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2">
                <i data-lucide="user-plus" class="w-5 h-5"></i> Nuevo
            </button>
        </div>
        <div id="clients-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>
</main>

<!-- NAV INFERIOR -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-20 z-40 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
    <button onclick="window.switchView('quotes')" id="nav-quotes" class="flex-1 flex flex-col items-center justify-center active-tab h-full transition-all">
        <i data-lucide="layout-grid" class="w-6 h-6 mb-1"></i>
        <span class="text-[11px] font-bold uppercase tracking-wider">Proyectos</span>
    </button>
    <button onclick="window.switchView('materials')" id="nav-materials" class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full transition-all">
        <i data-lucide="package" class="w-6 h-6 mb-1"></i>
        <span class="text-[11px] font-bold uppercase tracking-wider">Catálogo</span>
    </button>
    <button onclick="window.switchView('clients')" id="nav-clients" class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full transition-all">
        <i data-lucide="users" class="w-6 h-6 mb-1"></i>
        <span class="text-[11px] font-bold uppercase tracking-wider">Clientes</span>
    </button>
</nav>

<!-- MODAL: PDF PREVIEW -->
<div id="modal-pdf-preview" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden flex-col items-center justify-center p-4 z-[200]">
    <div class="bg-white w-full max-w-4xl h-[90vh] rounded-[1.5rem] overflow-hidden flex flex-col fade-in shadow-2xl border border-slate-700">
        <div class="p-4 border-b flex justify-between items-center bg-slate-50">
            <span class="font-bold text-slate-800 flex items-center gap-2">
                <i data-lucide="file-text" class="w-5 h-5 text-slate-500"></i> Vista Previa Oficial
            </span>
            <button onclick="window.closeModals()" class="p-2 hover:bg-slate-200 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="flex-1 bg-slate-200 p-2 md:p-6 overflow-hidden flex items-center justify-center">
            <iframe id="pdf-iframe" class="shadow-lg bg-white"></iframe>
        </div>
        <div class="p-4 flex gap-3 bg-white border-t">
            <button onclick="window.closeModals()" class="flex-1 py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">Cerrar</button>
            <button id="btn-download-pdf" class="flex-1 py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-lg flex justify-center items-center gap-2 transition-colors">
                <i data-lucide="download" class="w-5 h-5"></i> Descargar PDF
            </button>
        </div>
    </div>
</div>

<!-- MODAL: CLIENTE -->
<div id="modal-client" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex-col items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-sm rounded-[1.5rem] shadow-2xl overflow-hidden flex flex-col fade-in">
        <div class="p-5 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-extrabold text-lg text-slate-800" id="client-modal-title">Nuevo Cliente</h3>
            <button onclick="window.closeModals()" class="text-slate-400 hover:text-slate-800"><i data-lucide="x"></i></button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Nombre / Empresa</label>
                <input id="client-name" placeholder="Ej: Reformas S.L." class="w-full p-4 mt-1 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-slate-900 focus:ring-1 focus:ring-slate-900 transition-all">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Teléfono</label>
                <input id="client-phone" type="tel" placeholder="Ej: +34 600 000 000" class="w-full p-4 mt-1 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-slate-900 focus:ring-1 focus:ring-slate-900 transition-all">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Dirección Física</label>
                <input id="client-address" placeholder="Ej: C/ Mayor 12, Madrid" class="w-full p-4 mt-1 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-slate-900 focus:ring-1 focus:ring-slate-900 transition-all">
            </div>
            <button onclick="window.saveClient()" class="w-full py-4 mt-2 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-md transition-colors">Guardar Ficha</button>
        </div>
    </div>
</div>

<!-- MODAL: MATERIAL -->
<div id="modal-material" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex-col items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-sm rounded-[1.5rem] shadow-2xl overflow-hidden flex flex-col fade-in">
        <div class="p-5 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-extrabold text-lg text-slate-800" id="material-modal-title">Nuevo Material</h3>
            <button onclick="window.closeModals()" class="text-slate-400 hover:text-slate-800"><i data-lucide="x"></i></button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Descripción</label>
                <input id="material-name" placeholder="Ej: Cuadro eléctrico 12 elementos" class="w-full p-4 mt-1 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-slate-900 transition-all">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Precio Unitario (€)</label>
                <input id="material-price" type="number" step="0.01" placeholder="0.00" class="w-full p-4 mt-1 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-slate-900 transition-all">
            </div>
            <button onclick="window.saveMaterial()" class="w-full py-4 mt-2 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-md transition-colors">Añadir al Catálogo</button>
        </div>
    </div>
</div>

<!-- MODAL: PRESUPUESTO -->
<div id="modal-quote" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex-col items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-xl rounded-[1.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[85vh] fade-in">
        <div class="p-5 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-extrabold text-lg text-slate-800">Confeccionar Presupuesto</h3>
            <button onclick="window.closeModals()" class="text-slate-400 hover:text-slate-800"><i data-lucide="x"></i></button>
        </div>
        <div class="p-6 overflow-y-auto space-y-5 flex-1">
            <div class="space-y-4">
                <input id="q-title" placeholder="Referencia del proyecto (Ej: Reforma Chalet)" class="w-full p-4 bg-white border border-slate-300 rounded-xl outline-none focus:border-slate-900 text-lg font-bold">
                <select id="q-client" class="w-full p-4 bg-white border border-slate-300 rounded-xl outline-none focus:border-slate-900 appearance-none text-slate-700"></select>
            </div>
            
            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                <h4 class="text-xs font-bold text-slate-500 uppercase mb-3">Añadir Partidas</h4>
                <div class="flex gap-2 mb-4">
                    <select id="q-material" class="flex-1 p-3 border border-slate-300 rounded-xl bg-white outline-none focus:border-slate-900"></select>
                    <input id="q-qty" type="number" value="1" min="1" class="w-20 p-3 border border-slate-300 rounded-xl text-center outline-none focus:border-slate-900">
                    <button onclick="window.addMaterialToQuote()" class="bg-slate-900 text-white px-4 rounded-xl hover:bg-slate-800 transition-colors"><i data-lucide="plus"></i></button>
                </div>
                
                <ul id="q-items-list" class="space-y-2 mb-4 max-h-40 overflow-y-auto pr-2"></ul>
                
                <div class="mt-4 pt-4 border-t border-slate-300 flex justify-between items-center">
                    <span class="font-extrabold text-slate-500 uppercase tracking-wider text-sm">Base Imponible</span>
                    <span id="q-total" class="text-3xl font-black text-slate-900">0.00 €</span>
                </div>
            </div>
        </div>
        <div class="p-5 bg-white border-t">
            <button id="btn-save-quote" onclick="window.saveQuote()" class="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-lg transition-colors text-lg">
                Generar Documento
            </button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl font-bold text-sm transition-all duration-300 opacity-0 pointer-events-none z-[500]"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

// SEGURIDAD: Uso de variables de entorno para proteger credenciales.
const appId = typeof __app_id !== 'undefined' ? __app_id : 'electri-quote-pro-secure';
const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
    // Fallback config if running outside secure environment
    apiKey: "AIzaSyBuX9O3WBR5zX_L-WYdRiwirBl50aUFzlg",
    authDomain: "electriquote-b92c3.firebaseapp.com",
    projectId: "electriquote-b92c3",
    storageBucket: "electriquote-b92c3.appspot.com",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
window.dbData = { clients: [], materials: [], quotes: [] };
window.currentQuoteItems = [];
window.editingId = null;
window.currentPdfUrl = null;

const toast = (m, err = false) => {
    const el = document.getElementById('toast');
    if (!el) return;
    el.innerText = m;
    el.className = `fixed bottom-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl font-bold text-sm transition-all z-[500] opacity-100 ${err ? 'bg-red-600 text-white' : 'bg-slate-900 text-white'}`;
    setTimeout(() => el.classList.add('opacity-0'), 3000);
};

// --- AUTH LOGIC (SEGURIDAD MEJORADA) ---
// Autenticación automática y segura con tokens (Adiós contraseñas en texto plano)
const initAuth = async () => {
    try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    } catch (error) {
        console.error("Auth error:", error);
        toast("Error de conexión segura", true);
    }
};

window.logout = () => {
    signOut(auth);
    location.reload();
};

// --- NAVIGATION & MODALS ---
window.switchView = (v) => {
    ['quotes','materials','clients'].forEach(s => {
        document.getElementById('view-'+s).classList.add('hidden');
        document.getElementById('nav-'+s).classList.remove('active-tab');
        document.getElementById('nav-'+s).classList.add('text-slate-400');
    });
    document.getElementById('view-'+v).classList.remove('hidden');
    document.getElementById('nav-'+v).classList.add('active-tab');
    document.getElementById('nav-'+v).classList.remove('text-slate-400');
};

window.closeModals = () => {
    document.querySelectorAll('[id^="modal-"]').forEach(m => m.classList.add('hidden'));
    if(window.currentPdfUrl) {
        URL.revokeObjectURL(window.currentPdfUrl);
        window.currentPdfUrl = null;
    }
    document.getElementById('pdf-iframe').src = "";
    window.editingId = null;
};

// --- CLIENT ACTIONS (MODIFICADO: Teléfono y Dirección) ---
window.openClientModal = (id = null) => {
    const title = document.getElementById('client-modal-title');
    const nameInput = document.getElementById('client-name');
    const phoneInput = document.getElementById('client-phone');
    const addressInput = document.getElementById('client-address');
    
    if(id) {
        const c = window.dbData.clients.find(x => x.id === id);
        title.innerText = "Editar Cliente";
        nameInput.value = c.name;
        phoneInput.value = c.phone || "";
        addressInput.value = c.address || "";
        window.editingId = id;
    } else {
        title.innerText = "Nuevo Cliente";
        nameInput.value = "";
        phoneInput.value = "";
        addressInput.value = "";
        window.editingId = null;
    }
    document.getElementById('modal-client').classList.remove('hidden');
    document.getElementById('modal-client').classList.add('flex');
};

window.saveClient = async () => {
    if (!currentUser) return;
    const name = document.getElementById('client-name').value.trim();
    const phone = document.getElementById('client-phone').value.trim();
    const address = document.getElementById('client-address').value.trim();
    if(!name) return toast("El nombre es obligatorio", true);
    
    try {
        const path = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'clients');
        if(window.editingId) {
            await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'clients', window.editingId), { name, phone, address });
        } else {
            await addDoc(path, { name, phone, address, createdAt: serverTimestamp() });
        }
        window.closeModals();
        toast("Ficha guardada con éxito");
    } catch(e) { toast("Error al guardar", true); }
};

// --- MATERIAL ACTIONS ---
window.openMaterialModal = (id = null) => {
    const title = document.getElementById('material-modal-title');
    const nameInput = document.getElementById('material-name');
    const priceInput = document.getElementById('material-price');
    
    if(id) {
        const m = window.dbData.materials.find(x => x.id === id);
        title.innerText = "Editar Material";
        nameInput.value = m.name;
        priceInput.value = m.price;
        window.editingId = id;
    } else {
        title.innerText = "Nuevo Material";
        nameInput.value = "";
        priceInput.value = "";
        window.editingId = null;
    }
    document.getElementById('modal-material').classList.remove('hidden');
    document.getElementById('modal-material').classList.add('flex');
};

window.saveMaterial = async () => {
    if (!currentUser) return;
    const name = document.getElementById('material-name').value.trim();
    const price = parseFloat(document.getElementById('material-price').value);
    if(!name || isNaN(price)) return toast("Por favor, revisa los datos", true);
    
    try {
        const path = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'materials');
        if(window.editingId) {
            await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'materials', window.editingId), { name, price });
        } else {
            await addDoc(path, { name, price, createdAt: serverTimestamp() });
        }
        window.closeModals();
        toast("Material guardado");
    } catch(e) { toast("Error al guardar", true); }
};

// --- RENDERERS ---
const renderItems = (col) => {
    const list = document.getElementById(`${col}-list`);
    list.innerHTML = window.dbData[col].map(item => `
        <div class="bg-white p-5 rounded-2xl border border-slate-200 flex justify-between items-center shadow-sm hover:shadow-md transition-shadow">
            <div class="flex-1 cursor-pointer overflow-hidden" onclick="window.open${col.charAt(0).toUpperCase() + col.slice(1, -1)}Modal('${item.id}')">
                <span class="font-bold text-slate-800 text-lg block truncate">${item.name}</span>
                ${col === 'clients' 
                    ? `<div class="flex items-center gap-3 mt-1 text-xs text-slate-500 font-medium">
                         ${item.phone ? `<span class="flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i> ${item.phone}</span>` : ''}
                         ${item.address ? `<span class="flex items-center gap-1 truncate"><i data-lucide="map-pin" class="w-3 h-3"></i> ${item.address}</span>` : ''}
                         ${!item.phone && !item.address ? 'Sin datos de contacto' : ''}
                       </div>` 
                    : `<p class="text-sm font-bold text-slate-600 mt-1">${item.price.toFixed(2)} €</p>`
                }
            </div>
            <button onclick="window.deleteDoc('${col}','${item.id}')" class="text-slate-300 hover:text-red-500 ml-4 p-2 bg-slate-50 rounded-xl transition-colors">
                <i data-lucide="trash-2" class="w-5 h-5"></i>
            </button>
        </div>
    `).join('') || `<div class="col-span-full flex flex-col items-center justify-center py-12 text-slate-400 bg-slate-50 rounded-2xl border border-dashed border-slate-300"><i data-lucide="${col==='clients'?'users':'package'}" class="w-8 h-8 mb-2 opacity-50"></i><p class="font-medium">Directorio vacío</p></div>`;
    lucide.createIcons();
};

const renderQuotes = () => {
    const list = document.getElementById('quotes-list');
    list.innerHTML = window.dbData.quotes.map(q => {
        const c = window.dbData.clients.find(x => x.id === q.clientId)?.name || 'Cliente eliminado';
        return `
            <div onclick="window.previewPDF('${q.id}')" class="bg-white p-6 rounded-[1.5rem] border border-slate-200 shadow-sm hover:shadow-md transition-all cursor-pointer relative overflow-hidden group">
                <div class="absolute left-0 top-0 bottom-0 w-2 bg-slate-800"></div>
                <div class="flex justify-between items-center pl-2">
                    <div>
                        <h4 class="font-black text-slate-900 text-xl tracking-tight">${q.title}</h4>
                        <p class="text-sm font-semibold text-slate-500 mt-1 flex items-center gap-1">
                            <i data-lucide="user" class="w-4 h-4"></i> ${c}
                        </p>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <p class="text-2xl font-black text-slate-900 tracking-tight">${q.total.toFixed(2)} €</p>
                        <button onclick="event.stopPropagation(); window.deleteDoc('quotes','${q.id}')" class="text-slate-300 hover:text-red-500 mt-2 p-2 rounded-lg hover:bg-slate-50 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
    }).join('') || `<div class="col-span-full flex flex-col items-center justify-center py-12 text-slate-400 bg-slate-50 rounded-2xl border border-dashed border-slate-300"><i data-lucide="file-text" class="w-8 h-8 mb-2 opacity-50"></i><p class="font-medium">No hay proyectos generados</p></div>`;
    lucide.createIcons();
};

// --- DATA ACTIONS ---
window.addMaterialToQuote = () => {
    const mid = document.getElementById('q-material').value;
    const qty = parseInt(document.getElementById('q-qty').value);
    if (!mid || isNaN(qty) || qty < 1) return;
    
    const m = window.dbData.materials.find(x => x.id === mid);
    if(!m) return;
    window.currentQuoteItems.push({...m, qty, subtotal: m.price * qty});
    window.renderQuoteUI();
};

window.renderQuoteUI = () => {
    const list = document.getElementById('q-items-list');
    let total = 0;
    list.innerHTML = window.currentQuoteItems.map((item, i) => {
        total += item.subtotal;
        return `<li class="flex justify-between items-center text-sm bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
            <span class="font-semibold text-slate-700">${item.qty} <span class="text-slate-400 font-normal mx-1">x</span> ${item.name}</span>
            <div class="flex items-center gap-4">
                <span class="font-black text-slate-900">${item.subtotal.toFixed(2)} €</span>
                <button onclick="window.currentQuoteItems.splice(${i},1); window.renderQuoteUI();" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="x-circle" class="w-5 h-5"></i></button>
            </div>
        </li>`;
    }).join('');
    document.getElementById('q-total').innerText = total.toFixed(2) + " €";
    lucide.createIcons();
};

window.saveQuote = async () => {
    if (!currentUser) return;
    const title = document.getElementById('q-title').value.trim();
    const clientId = document.getElementById('q-client').value;
    if(!title || !clientId || window.currentQuoteItems.length === 0) return toast("Faltan datos para procesar", true);
    
    const total = window.currentQuoteItems.reduce((acc, i) => acc + i.subtotal, 0);
    try {
        await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'quotes'), {
            title, clientId, items: window.currentQuoteItems, total, createdAt: serverTimestamp()
        });
        window.closeModals();
        toast("Documento generado con éxito");
    } catch(e) { toast("Error al guardar", true); }
};

window.deleteDoc = async (col, id) => {
    if(!currentUser || !confirm("¿Eliminar este registro permanentemente?")) return;
    try {
        await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, col, id));
        toast("Registro eliminado");
    } catch(e) { toast("Error", true); }
};

window.openQuoteModal = () => {
    const clientSelect = document.getElementById('q-client');
    const materialSelect = document.getElementById('q-material');
    
    if(window.dbData.clients.length === 0) {
        toast("Debes añadir al menos un cliente primero", true);
        return;
    }
    
    clientSelect.innerHTML = window.dbData.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    materialSelect.innerHTML = window.dbData.materials.map(m => `<option value="${m.id}">${m.name} (${m.price.toFixed(2)}€)</option>`).join('');
    
    window.currentQuoteItems = [];
    document.getElementById('q-title').value = "";
    document.getElementById('q-qty').value = "1";
    window.renderQuoteUI();
    document.getElementById('modal-quote').classList.remove('hidden');
    document.getElementById('modal-quote').classList.add('flex');
};

// --- PDF ENGINE (DISEÑO PROFESIONAL MINIMALISTA) ---
window.previewPDF = (id) => {
    const q = window.dbData.quotes.find(x => x.id === id);
    const client = window.dbData.clients.find(x => x.id === q.clientId);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Configuración general corporativa
    const primaryColor = [15, 23, 42]; // Slate-900
    const secondaryColor = [100, 116, 139]; // Slate-500
    
    // Header minimalista
    doc.setFont("helvetica", "bold");
    doc.setFontSize(26);
    doc.setTextColor(...primaryColor);
    doc.text("PRESUPUESTO", 20, 30);
    
    // Separador sutil
    doc.setDrawColor(226, 232, 240); // Slate-200
    doc.setLineWidth(0.5);
    doc.line(20, 35, 190, 35);
    
    // Datos del Proyecto y Fecha
    doc.setFontSize(10);
    doc.setFont("helvetica", "bold");
    doc.setTextColor(...primaryColor);
    doc.text("DATOS DEL DOCUMENTO", 20, 45);
    
    doc.setFont("helvetica", "normal");
    doc.setTextColor(...secondaryColor);
    doc.text(`Referencia:`, 20, 52);
    doc.setTextColor(...primaryColor);
    doc.setFont("helvetica", "bold");
    doc.text(`${q.title.toUpperCase()}`, 40, 52);
    
    doc.setFont("helvetica", "normal");
    doc.setTextColor(...secondaryColor);
    doc.text(`Fecha:`, 20, 57);
    doc.setTextColor(...primaryColor);
    doc.text(`${new Date().toLocaleDateString()}`, 40, 57);
    
    // Datos del Cliente (Alineados a la derecha)
    doc.setFont("helvetica", "bold");
    doc.setTextColor(...primaryColor);
    doc.text("CLIENTE", 130, 45);
    
    doc.setFont("helvetica", "normal");
    doc.setTextColor(...secondaryColor);
    let currentY = 52;
    if(client?.name) { doc.text(client.name, 130, currentY); currentY += 5; }
    if(client?.address) { doc.text(client.address, 130, currentY); currentY += 5; }
    if(client?.phone) { doc.text(`Tel: ${client.phone}`, 130, currentY); }
    
    // Tabla Elegante (Tema Plain con diseño custom)
    doc.autoTable({
        startY: 75,
        head: [['CONCEPTO', 'CANTIDAD', 'PRECIO UN.', 'IMPORTE']],
        body: q.items.map(i => [i.name, i.qty.toString(), i.price.toFixed(2)+' €', i.subtotal.toFixed(2)+' €']),
        foot: [['', '', 'TOTAL A ABONAR', q.total.toFixed(2)+' €']],
        theme: 'plain',
        headStyles: { 
            fillColor: [248, 250, 252], // Slate-50 background
            textColor: primaryColor, 
            fontStyle: 'bold',
            cellPadding: 4,
            lineWidth: {bottom: 0.5},
            lineColor: [226, 232, 240]
        },
        bodyStyles: {
            textColor: [71, 85, 105], // Slate-600
            cellPadding: 4,
            lineWidth: {bottom: 0.1},
            lineColor: [241, 245, 249]
        },
        footStyles: { 
            textColor: primaryColor, 
            fontStyle: 'bold', 
            fontSize: 12,
            cellPadding: 6,
            fillColor: [241, 245, 249] // Slate-100
        },
        columnStyles: {
            1: { halign: 'center' },
            2: { halign: 'right' },
            3: { halign: 'right' }
        }
    });

    // Pie de página comercial
    const finalY = doc.lastAutoTable.finalY + 20;
    doc.setFontSize(8);
    doc.setTextColor(148, 163, 184); // Slate-400
    doc.text("Documento generado por ElectriQuote Pro. Presupuesto válido por 30 días.", 105, 280, { align: 'center' });

    const blob = doc.output('blob');
    if(window.currentPdfUrl) URL.revokeObjectURL(window.currentPdfUrl);
    window.currentPdfUrl = URL.createObjectURL(blob);
    
    const iframe = document.getElementById('pdf-iframe');
    iframe.src = window.currentPdfUrl;
    
    document.getElementById('btn-download-pdf').onclick = () => doc.save(`Presupuesto_${q.title.replace(/\s+/g, '_')}.pdf`);
    document.getElementById('modal-pdf-preview').classList.remove('hidden');
    document.getElementById('modal-pdf-preview').classList.add('flex');
};

// --- INITIALIZATION ---
// Iniciamos Auth Seguro primero
initAuth();

onAuthStateChanged(auth, (user) => {
    const authScr = document.getElementById('auth-screen');
    const syncInd = document.getElementById('sync-indicator');
    
    if(user) {
        currentUser = user;
        authScr.classList.add('hidden');
        syncInd.classList.replace('bg-slate-400', 'bg-emerald-500'); // Indicador de base de datos activa
        
        // Consultas protegidas y limitadas al UID del usuario activo
        const sync = (c, r) => onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, c), s => {
            window.dbData[c] = s.docs.map(d => ({id: d.id, ...d.data()}));
            r();
        }, (err) => {
            console.error(err);
            toast("Error sincronización segura", true);
            syncInd.classList.replace('bg-emerald-500', 'bg-red-500');
        });
        
        sync('clients', () => renderItems('clients'));
        sync('materials', () => renderItems('materials'));
        sync('quotes', renderQuotes);
    } else {
        currentUser = null;
        authScr.classList.remove('hidden');
        syncInd.classList.replace('bg-emerald-500', 'bg-slate-400');
    }
});

lucide.createIcons();
</script>
</body>
</html>
