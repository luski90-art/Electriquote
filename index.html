<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectriQuote Pro - Sistema de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Firebase SDKs (v11 Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Configuración Global
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'electri-pro-v2';
        const firebaseConfig = JSON.parse(__firebase_config);
        
        // Inicialización
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Estado de la App
        window.dbData = { clients: [], materials: [], quotes: [] };
        window.currentQuoteItems = [];
        window.editingId = null;
        let currentUser = null;

        // --- FUNCIONES DE NAVEGACIÓN Y UI ---
        window.switchView = (v) => {
            ['quotes', 'materials', 'clients'].forEach(s => {
                const el = document.getElementById('view-' + s);
                const nav = document.getElementById('nav-' + s);
                if(el) el.classList.add('hidden');
                if(nav) {
                    nav.classList.remove('active-tab', 'text-blue-600');
                    nav.classList.add('text-slate-400');
                }
            });
            const activeEl = document.getElementById('view-' + v);
            const activeNav = document.getElementById('nav-' + v);
            if(activeEl) activeEl.classList.remove('hidden');
            if(activeNav) {
                activeNav.classList.add('active-tab', 'text-blue-600');
                activeNav.classList.remove('text-slate-400');
            }
        };

        window.closeModals = () => {
            document.getElementById('modal-quote').classList.add('hidden');
            document.getElementById('modal-form').classList.add('hidden');
            window.editingId = null;
        };

        // --- GESTIÓN DE CLIENTES ---
        window.openClientModal = (id = null) => {
            window.editingId = id;
            const c = id ? window.dbData.clients.find(x => x.id === id) : { name: '', phone: '', address: '' };
            document.getElementById('form-modal-title').innerText = id ? "Editar Cliente" : "Nuevo Cliente";
            document.getElementById('form-container').innerHTML = `
                <input id="f-name" value="${c.name || ''}" placeholder="Nombre completo" class="w-full p-4 bg-slate-100 rounded-xl font-bold border-none">
                <input id="f-phone" value="${c.phone || ''}" placeholder="Teléfono" class="w-full p-4 bg-slate-100 rounded-xl font-bold border-none">
                <input id="f-addr" value="${c.address || ''}" placeholder="Dirección" class="w-full p-4 bg-slate-100 rounded-xl font-bold border-none">
            `;
            document.getElementById('btn-form-save').onclick = window.saveClient;
            document.getElementById('modal-form').classList.remove('hidden');
        };

        window.saveClient = async () => {
            if (!currentUser) return;
            const data = {
                name: document.getElementById('f-name').value,
                phone: document.getElementById('f-phone').value,
                address: document.getElementById('f-addr').value
            };
            if(!data.name) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'clients');
            if(window.editingId) await setDoc(doc(colRef, window.editingId), data, {merge:true});
            else await addDoc(colRef, data);
            window.closeModals();
        };

        // --- GESTIÓN DE MATERIALES ---
        window.openMaterialModal = (id = null) => {
            window.editingId = id;
            const m = id ? window.dbData.materials.find(x => x.id === id) : { name: '', price: '' };
            document.getElementById('form-modal-title').innerText = id ? "Editar Material" : "Nuevo Material";
            document.getElementById('form-container').innerHTML = `
                <input id="f-m-name" value="${m.name || ''}" placeholder="Nombre Material" class="w-full p-4 bg-slate-100 rounded-xl font-bold border-none">
                <input id="f-m-price" type="number" step="0.01" value="${m.price || ''}" placeholder="Precio €" class="w-full p-4 bg-slate-100 rounded-xl font-bold border-none">
            `;
            document.getElementById('btn-form-save').onclick = window.saveMaterial;
            document.getElementById('modal-form').classList.remove('hidden');
        };

        window.saveMaterial = async () => {
            if (!currentUser) return;
            const data = {
                name: document.getElementById('f-m-name').value,
                price: parseFloat(document.getElementById('f-m-price').value) || 0
            };
            if(!data.name) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'materials');
            if(window.editingId) await setDoc(doc(colRef, window.editingId), data, {merge:true});
            else await addDoc(colRef, data);
            window.closeModals();
        };

        // --- GESTIÓN DE PRESUPUESTOS (QUOTES) ---
        window.openQuoteModal = () => {
            window.editingId = null;
            window.currentQuoteItems = [];
            document.getElementById('quote-modal-title').innerText = "Nuevo Proyecto";
            document.getElementById('pdf-action-area').classList.add('hidden');
            document.getElementById('q-client').value = "";
            window.renderQuoteItems();
            document.getElementById('modal-quote').classList.remove('hidden');
        };

        window.addItemToQuote = () => {
            const mId = document.getElementById('q-material').value;
            const qty = parseFloat(document.getElementById('q-qty').value) || 1;
            const m = window.dbData.materials.find(x => x.id === mId);
            if(!m) return;
            window.currentQuoteItems.push({ 
                id: Date.now(), 
                name: m.name, 
                price: m.price, 
                qty, 
                total: m.price * qty 
            });
            window.renderQuoteItems();
        };

        window.removeItem = (index) => {
            window.currentQuoteItems.splice(index, 1);
            window.renderQuoteItems();
        };

        window.renderQuoteItems = () => {
            const list = document.getElementById('q-items-list');
            let total = 0;
            list.innerHTML = window.currentQuoteItems.map((it, i) => {
                total += it.total;
                return `<div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center border border-slate-100">
                    <div><p class="font-bold text-slate-800">${it.name}</p><p class="text-xs font-bold text-slate-400">${it.qty} x ${it.price.toFixed(2)}€</p></div>
                    <div class="flex items-center gap-3"><span class="font-black text-slate-900">${it.total.toFixed(2)}€</span><button onclick="window.removeItem(${i})" class="text-red-400 p-2 font-bold">✕</button></div>
                </div>`;
            }).join('');
            document.getElementById('q-total-val').innerText = total.toFixed(2) + "€";
        };

        window.saveQuote = async () => {
            if (!currentUser) return;
            const cliId = document.getElementById('q-client').value;
            const cli = window.dbData.clients.find(x => x.id === cliId);
            if(!cli || !window.currentQuoteItems.length) return;

            const payload = {
                clientName: cli.name, clientPhone: cli.phone, clientAddress: cli.address,
                items: window.currentQuoteItems,
                total: window.currentQuoteItems.reduce((a,b) => a+b.total, 0),
                updatedAt: serverTimestamp()
            };

            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'quotes');
            if(window.editingId) await setDoc(doc(colRef, window.editingId), payload, {merge:true});
            else await addDoc(colRef, {...payload, createdAt: serverTimestamp()});
            window.closeModals();
        };

        window.viewQuote = (id) => {
            const q = window.dbData.quotes.find(x => x.id === id);
            if(!q) return;
            window.editingId = id;
            window.currentQuoteItems = [...q.items];
            document.getElementById('quote-modal-title').innerText = "Editar Proyecto";
            document.getElementById('pdf-action-area').classList.remove('hidden');
            const cli = window.dbData.clients.find(c => c.name === q.clientName);
            if(cli) document.getElementById('q-client').value = cli.id;
            window.renderQuoteItems();
            document.getElementById('modal-quote').classList.remove('hidden');
        };

        window.handleDeleteDoc = async (id, colName) => {
            if (!currentUser) return;
            const confirmDel = document.createElement('div'); // Reemplazo de confirm simple para evitar bloqueos
            if(confirm("¿Eliminar este registro permanentemente?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, id));
            }
        };

        // --- GENERACIÓN PDF ---
        window.generatePDF = async () => {
            const q = window.dbData.quotes.find(x => x.id === window.editingId);
            if(!q) return;
            const zone = document.getElementById('pdf-render-zone');
            zone.innerHTML = `
                <div style="padding: 40px; color: #1e293b; font-family: sans-serif; background: white;">
                    <h1 style="font-size: 28px; font-weight: 800; color: #2563eb; margin-bottom: 5px;">ELECTRIQUOTE</h1>
                    <p style="font-size: 12px; color: #64748b; margin-bottom: 30px;">PRESUPUESTO PROFESIONAL</p>
                    <div style="margin: 20px 0; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
                        <p style="margin: 0 0 5px 0;"><strong>CLIENTE:</strong> ${q.clientName}</p>
                        <p style="margin: 0 0 5px 0;"><strong>DIRECCIÓN:</strong> ${q.clientAddress}</p>
                        <p style="margin: 0;"><strong>TELÉFONO:</strong> ${q.clientPhone}</p>
                    </div>
                    <table style="width: 100%; border-collapse: collapse; margin-top: 30px;">
                        <thead>
                            <tr style="background: #0f172a; color: white; text-align: left;">
                                <th style="padding: 12px;">DESCRIPCIÓN</th>
                                <th style="padding: 12px; text-align: center;">CANT.</th>
                                <th style="padding: 12px; text-align: right;">PRECIO</th>
                                <th style="padding: 12px; text-align: right;">TOTAL</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${q.items.map(it => `
                                <tr style="border-bottom: 1px solid #e2e8f0;">
                                    <td style="padding: 12px; font-weight: 600;">${it.name}</td>
                                    <td style="padding: 12px; text-align: center;">${it.qty}</td>
                                    <td style="padding: 12px; text-align: right;">${it.price.toFixed(2)}€</td>
                                    <td style="padding: 12px; text-align: right; font-weight: 700;">${it.total.toFixed(2)}€</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div style="margin-top: 40px; text-align: right;">
                        <p style="font-size: 14px; color: #64748b; margin: 0;">Importe Total:</p>
                        <p style="font-size: 32px; font-weight: 900; color: #2563eb; margin: 5px 0 0 0;">${q.total.toFixed(2)}€</p>
                    </div>
                </div>
            `;
            try {
                const canvas = await html2canvas(zone, { scale: 2 });
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
                pdf.save(`Presupuesto_${q.clientName}.pdf`);
            } catch(e) { console.error("Error PDF:", e); }
        };

        const updateSelectors = () => {
            const cS = document.getElementById('q-client');
            const mS = document.getElementById('q-material');
            if(cS) cS.innerHTML = '<option value="">-- Seleccionar Cliente --</option>' + window.dbData.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            if(mS) mS.innerHTML = '<option value="">-- Seleccionar Material --</option>' + window.dbData.materials.map(m => `<option value="${m.id}">${m.name} (${m.price.toFixed(2)}€)</option>`).join('');
        };

        // --- LÓGICA DE ARRANQUE ---
        const init = async () => {
            const dot = document.getElementById('status-dot');
            dot.className = 'w-3 h-3 rounded-full bg-yellow-500';

            // 1. Auth First
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    dot.className = 'w-3 h-3 rounded-full bg-green-500';
                    setupSync();
                } else {
                    dot.className = 'w-3 h-3 rounded-full bg-red-500';
                }
            });
        };

        const setupSync = () => {
            const dataPath = collection(db, 'artifacts', appId, 'public', 'data');

            // Sync Clientes
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), (s) => {
                window.dbData.clients = s.docs.map(d => ({id: d.id, ...d.data()}));
                const list = document.getElementById('clients-list');
                if(list) list.innerHTML = window.dbData.clients.map(c => `
                    <div onclick="window.openClientModal('${c.id}')" class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-transparent hover:border-slate-200">
                        <div><p class="font-bold text-slate-800">${c.name}</p><p class="text-xs text-slate-400">${c.phone}</p></div>
                        <button onclick="event.stopPropagation(); window.handleDeleteDoc('${c.id}', 'clients')" class="p-2 text-slate-300 hover:text-red-500">🗑️</button>
                    </div>
                `).join('');
                updateSelectors();
            }, (e) => console.error(e));

            // Sync Materiales
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'materials'), (s) => {
                window.dbData.materials = s.docs.map(d => ({id: d.id, ...d.data()}));
                const list = document.getElementById('materials-list');
                if(list) list.innerHTML = window.dbData.materials.map(m => `
                    <div onclick="window.openMaterialModal('${m.id}')" class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-transparent hover:border-slate-200">
                        <div><p class="font-bold text-slate-800">${m.name}</p><p class="text-blue-600 font-bold">${m.price.toFixed(2)}€</p></div>
                        <button onclick="event.stopPropagation(); window.handleDeleteDoc('${m.id}', 'materials')" class="p-2 text-slate-300 hover:text-red-500">🗑️</button>
                    </div>
                `).join('');
                updateSelectors();
            }, (e) => console.error(e));

            // Sync Proyectos
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'quotes'), (s) => {
                window.dbData.quotes = s.docs.map(d => ({id: d.id, ...d.data()}));
                const list = document.getElementById('quotes-list');
                if(list) list.innerHTML = window.dbData.quotes.length ? window.dbData.quotes.map(q => `
                    <div onclick="window.viewQuote('${q.id}')" class="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm border border-transparent hover:border-blue-200 active:scale-95 transition-all">
                        <div><h3 class="font-black text-slate-800">${q.clientName}</h3><p class="text-xl font-black text-blue-600">${q.total.toFixed(2)}€</p></div>
                        <button onclick="event.stopPropagation(); window.handleDeleteDoc('${q.id}', 'quotes')" class="p-2 text-slate-200 hover:text-red-400">🗑️</button>
                    </div>
                `).join('') : '<div class="text-center py-10 text-slate-400 font-medium italic">Empieza creando un nuevo proyecto</div>';
            }, (e) => console.error(e));
        };

        window.addEventListener('load', init);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .active-tab { color: #2563eb; border-top: 3px solid #2563eb; background: white; }
        #pdf-render-zone { position: absolute; left: -9999px; top: 0; width: 210mm; background: white; }
        input, select, button { outline: none !important; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-40 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg text-white font-bold">⚡</div>
            <h1 class="text-lg font-extrabold tracking-tight text-slate-800">ELECTRI<span class="text-blue-600">QUOTE</span></h1>
        </div>
        <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-300"></div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <!-- VISTA: PROYECTOS -->
        <section id="view-quotes" class="space-y-4">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900">Proyectos</h2>
                    <p class="text-slate-500 text-sm">Gestión de presupuestos</p>
                </div>
                <button onclick="window.openQuoteModal()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-blue-200">Nuevo +</button>
            </div>
            <div id="quotes-list" class="grid gap-3 pt-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm text-center text-slate-400 italic">Cargando proyectos...</div>
            </div>
        </section>

        <!-- VISTA: MATERIALES -->
        <section id="view-materials" class="hidden space-y-4">
            <div class="flex justify-between items-end">
                <h2 class="text-2xl font-bold text-slate-900">Catálogo</h2>
                <button onclick="window.openMaterialModal()" class="bg-slate-900 text-white px-5 py-2 rounded-xl font-bold">Añadir</button>
            </div>
            <div id="materials-list" class="grid gap-2"></div>
        </section>

        <!-- VISTA: CLIENTES -->
        <section id="view-clients" class="hidden space-y-4">
            <div class="flex justify-between items-end">
                <h2 class="text-2xl font-bold text-slate-900">Clientes</h2>
                <button onclick="window.openClientModal()" class="bg-slate-900 text-white px-5 py-2 rounded-xl font-bold">Nuevo</button>
            </div>
            <div id="clients-list" class="grid gap-2"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-16 z-50">
        <button onclick="window.switchView('quotes')" id="nav-quotes" class="flex-1 flex flex-col items-center justify-center active-tab h-full">
            <span class="text-xl">📋</span>
            <span class="text-[10px] font-bold uppercase mt-1">Proyectos</span>
        </button>
        <button onclick="window.switchView('materials')" id="nav-materials" class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full">
            <span class="text-xl">📦</span>
            <span class="text-[10px] font-bold uppercase mt-1">Catálogo</span>
        </button>
        <button onclick="window.switchView('clients')" id="nav-clients" class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full">
            <span class="text-xl">👥</span>
            <span class="text-[10px] font-bold uppercase mt-1">Clientes</span>
        </button>
    </nav>

    <!-- MODAL PRESUPUESTO -->
    <div id="modal-quote" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center">
        <div class="bg-white w-full h-full sm:h-[90vh] sm:max-w-2xl sm:rounded-3xl flex flex-col shadow-2xl overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800" id="quote-modal-title">Proyecto</h3>
                <button onclick="window.closeModals()" class="text-slate-400 text-3xl p-2">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div id="pdf-action-area" class="hidden">
                    <button onclick="window.generatePDF()" class="w-full bg-red-50 text-red-600 border-2 border-dashed border-red-200 py-4 rounded-2xl font-black flex items-center justify-center gap-2">
                        📄 GENERAR PDF
                    </button>
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Cliente</label>
                    <select id="q-client" class="w-full p-4 bg-slate-100 rounded-2xl border-none font-bold text-slate-800"></select>
                </div>

                <div class="bg-blue-600 p-6 rounded-3xl text-white">
                    <label class="text-[10px] font-black opacity-80 uppercase block mb-3">Agregar Concepto</label>
                    <div class="grid grid-cols-1 gap-3">
                        <select id="q-material" class="w-full p-3 rounded-xl text-slate-900 font-bold border-none"></select>
                        <div class="flex gap-2">
                            <input type="number" id="q-qty" value="1" class="flex-1 p-3 rounded-xl text-slate-900 font-bold text-center border-none">
                            <button onclick="window.addItemToQuote()" class="bg-yellow-400 text-slate-900 px-8 rounded-xl font-black">AÑADIR</button>
                        </div>
                    </div>
                </div>

                <div id="q-items-list" class="space-y-3"></div>
            </div>
            <div class="p-6 bg-slate-900 text-white">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-slate-400 font-bold uppercase">Total</span>
                    <span id="q-total-val" class="text-4xl font-black text-blue-400">0.00€</span>
                </div>
                <button onclick="window.saveQuote()" id="btn-save-quote" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-lg">GUARDAR PROYECTO</button>
            </div>
        </div>
    </div>

    <!-- MODAL FORMULARIO SIMPLE -->
    <div id="modal-form" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-4 bg-slate-50 border-b font-bold text-slate-800 text-center" id="form-modal-title">Formulario</div>
            <div id="form-container" class="p-6 space-y-4"></div>
            <div class="p-4 bg-slate-50 flex gap-2">
                <button onclick="window.closeModals()" class="flex-1 bg-white border py-3 rounded-xl font-bold text-slate-500">Cancelar</button>
                <button id="btn-form-save" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Guardar</button>
            </div>
        </div>
    </div>

    <div id="pdf-render-zone"></div>
</body>
</html>
