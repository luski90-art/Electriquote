<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectriQuote Pro - Gestión Profesional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
        }
        .active-tab { 
            color: #2563eb; 
            border-top: 3px solid #2563eb; 
            background: #eff6ff; 
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Loader para botones */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-24 text-slate-800">

<!-- PANTALLA DE ACCESO (AUTH) -->
<div id="auth-screen" class="fixed inset-0 bg-slate-900 z-[999] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden p-8 fade-in text-center">
        <div class="bg-blue-600 w-16 h-16 rounded-2xl text-white flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-200">
            <i data-lucide="zap" class="w-8 h-8"></i>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">ELECTRI<span class="text-blue-600">QUOTE</span></h2>
        <p class="text-slate-500 text-sm mb-8 mt-1">Sincronización en la nube profesional</p>
        
        <div class="space-y-4 text-left">
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Correo Electrónico</label>
                <input id="auth-email" type="email" placeholder="ejemplo@correo.com" class="w-full p-4 mt-1 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Contraseña</label>
                <input id="auth-pass" type="password" placeholder="Mínimo 6 caracteres" class="w-full p-4 mt-1 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            
            <div class="pt-4 space-y-3">
                <button id="btn-login" onclick="window.handleAuth('login')" class="w-full py-4 font-bold bg-blue-600 hover:bg-blue-700 text-white rounded-2xl shadow-lg shadow-blue-100 transition-all flex justify-center items-center">
                    Iniciar Sesión
                </button>
                <button id="btn-register" onclick="window.handleAuth('register')" class="w-full py-4 font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-2xl transition-all flex justify-center items-center">
                    Crear mi Cuenta
                </button>
            </div>
            <p class="text-[10px] text-center text-slate-400 mt-4 px-4">Al usar la app, tus datos se guardarán de forma segura en tu cuenta privada.</p>
        </div>
    </div>
</div>

<header class="bg-white border-b border-slate-100 p-4 sticky top-0 z-40 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <div class="bg-blue-600 p-2 rounded-lg text-white">
            <i data-lucide="zap" class="w-4 h-4"></i>
        </div>
        <h1 class="text-lg font-black tracking-tighter text-slate-800">ELECTRI<span class="text-blue-600">QUOTE</span></h1>
    </div>
    <div class="flex items-center gap-2">
        <div id="sync-indicator" class="w-2 h-2 rounded-full bg-emerald-500"></div>
        <button onclick="window.logout()" class="text-slate-400 hover:text-red-500 p-2 rounded-xl bg-slate-50 transition-colors">
            <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
    </div>
</header>

<main class="max-w-3xl mx-auto p-4 md:p-6">
    <!-- VISTA: PRESUPUESTOS -->
    <section id="view-quotes" class="space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold text-slate-900">Proyectos</h2>
            <button onclick="window.openQuoteModal()" class="bg-blue-600 text-white px-5 py-3 rounded-2xl font-bold shadow-lg shadow-blue-200 flex items-center gap-2">
                <i data-lucide="plus" class="w-5 h-5"></i> Nuevo
            </button>
        </div>
        <div id="quotes-list" class="grid gap-4"></div>
    </section>

    <!-- VISTA: MATERIALES -->
    <section id="view-materials" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold text-slate-900">Materiales</h2>
            <button onclick="window.openMaterialModal()" class="bg-slate-900 text-white px-5 py-3 rounded-2xl font-bold flex items-center gap-2">
                <i data-lucide="plus" class="w-5 h-5"></i> Añadir
            </button>
        </div>
        <div id="materials-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>

    <!-- VISTA: CLIENTES -->
    <section id="view-clients" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold text-slate-900">Clientes</h2>
            <button onclick="window.openClientModal()" class="bg-slate-900 text-white px-5 py-3 rounded-2xl font-bold flex items-center gap-2">
                <i data-lucide="user-plus" class="w-5 h-5"></i> Nuevo
            </button>
        </div>
        <div id="clients-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>
</main>

<!-- NAV INFERIOR -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-slate-100 flex justify-around items-center h-20 z-40 pb-safe">
    <button onclick="window.switchView('quotes')" id="nav-quotes" class="flex-1 flex flex-col items-center justify-center active-tab">
        <i data-lucide="layout-grid" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold uppercase">Proyectos</span>
    </button>
    <button onclick="window.switchView('materials')" id="nav-materials" class="flex-1 flex flex-col items-center justify-center text-slate-400">
        <i data-lucide="package" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold uppercase">Catálogo</span>
    </button>
    <button onclick="window.switchView('clients')" id="nav-clients" class="flex-1 flex flex-col items-center justify-center text-slate-400">
        <i data-lucide="users" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold uppercase">Clientes</span>
    </button>
</nav>

<!-- MODAL: PDF PREVIEW -->
<div id="modal-pdf-preview" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden flex-col items-center justify-center p-4 z-[200]">
    <div class="bg-white w-full max-w-4xl h-[90vh] rounded-[2rem] overflow-hidden flex flex-col fade-in">
        <div class="p-4 border-b flex justify-between items-center bg-slate-50">
            <span class="font-bold text-slate-700">Vista Previa del Presupuesto</span>
            <button onclick="window.closeModals()" class="p-2 bg-white rounded-full border shadow-sm"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="flex-1 bg-slate-200 relative">
            <iframe id="pdf-iframe" class="w-full h-full border-none"></iframe>
        </div>
        <div class="p-4 flex gap-3 bg-white">
            <button onclick="window.closeModals()" class="flex-1 py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl">Cerrar</button>
            <button id="btn-download-pdf" class="flex-1 py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-100 flex justify-center items-center gap-2">
                <i data-lucide="download" class="w-5 h-5"></i> Descargar
            </button>
        </div>
    </div>
</div>

<!-- OTROS MODALES (Simplificados para brevedad) -->
<div id="modal-quote" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex-col items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden flex flex-col max-h-[85vh] fade-in">
        <div class="p-5 border-b flex justify-between items-center">
            <h3 class="font-bold text-lg" id="q-modal-title">Presupuesto</h3>
            <button onclick="window.closeModals()"><i data-lucide="x"></i></button>
        </div>
        <div class="p-6 overflow-y-auto space-y-4 flex-1">
            <input id="q-title" placeholder="Nombre del proyecto" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:border-blue-500">
            <select id="q-client" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none"></select>
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                <div class="flex gap-2 mb-4">
                    <select id="q-material" class="flex-1 p-2 border rounded-xl bg-white"></select>
                    <input id="q-qty" type="number" value="1" class="w-16 p-2 border rounded-xl text-center">
                    <button onclick="window.addMaterialToQuote()" class="bg-blue-600 text-white px-3 rounded-xl"><i data-lucide="plus"></i></button>
                </div>
                <ul id="q-items-list" class="space-y-2"></ul>
                <div class="mt-4 pt-4 border-t flex justify-between items-center">
                    <span class="font-bold text-slate-500">TOTAL</span>
                    <span id="q-total" class="text-2xl font-black text-blue-600">0.00 €</span>
                </div>
            </div>
        </div>
        <div class="p-4 bg-slate-50 flex gap-3">
            <button id="btn-save-quote" onclick="window.saveQuote()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl">Guardar Proyecto</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl font-bold text-sm transition-all duration-300 opacity-0 pointer-events-none z-[500]"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const appId = 'electri-quote-pro-v5'; // ID Unico
const firebaseConfig = {
    apiKey: "AIzaSyBuX9O3WBR5zX_L-WYdRiwirBl50aUFzlg",
    authDomain: "electriquote-b92c3.firebaseapp.com",
    projectId: "electriquote-b92c3",
    storageBucket: "electriquote-b92c3.appspot.com",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
window.dbData = { clients: [], materials: [], quotes: [] };
window.currentQuoteItems = [];
window.editingId = null;

const toast = (m, err = false) => {
    const el = document.getElementById('toast');
    el.innerText = m;
    el.className = `fixed bottom-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl font-bold text-sm transition-all z-[500] opacity-100 ${err ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'}`;
    setTimeout(() => el.classList.add('opacity-0'), 3000);
};

// --- AUTH LOGIC ---
window.handleAuth = async (type) => {
    const email = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-pass').value.trim();
    const btn = document.getElementById(type === 'login' ? 'btn-login' : 'btn-register');
    
    if(!email || !pass) return toast("Rellena todos los campos", true);
    if(pass.length < 6) return toast("Contraseña mínima: 6 caracteres", true);

    const originalText = btn.innerText;
    btn.innerHTML = `<span class="loader"></span> Procesando...`;
    btn.disabled = true;

    try {
        if(type === 'login') await signInWithEmailAndPassword(auth, email, pass);
        else await createUserWithEmailAndPassword(auth, email, pass);
        toast(type === 'login' ? "Bienvenido de nuevo" : "Cuenta creada correctamente");
    } catch(e) {
        console.error(e);
        let msg = "Error de conexión";
        if(e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = "Correo o contraseña incorrectos";
        if(e.code === 'auth/email-already-in-use') msg = "Este correo ya está registrado";
        if(e.code === 'auth/operation-not-allowed') msg = "El registro por email no está activo en Firebase";
        toast(msg, true);
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
};

window.logout = () => signOut(auth);

// --- NAVIGATION ---
window.switchView = (v) => {
    ['quotes','materials','clients'].forEach(s => {
        document.getElementById('view-'+s).classList.add('hidden');
        document.getElementById('nav-'+s).classList.remove('active-tab');
        document.getElementById('nav-'+s).classList.add('text-slate-400');
    });
    document.getElementById('view-'+v).classList.remove('hidden');
    document.getElementById('nav-'+v).classList.add('active-tab');
    document.getElementById('nav-'+v).classList.remove('text-slate-400');
};

window.closeModals = () => {
    document.querySelectorAll('[id^="modal-"]').forEach(m => m.classList.add('hidden'));
    document.getElementById('pdf-iframe').src = "";
    window.editingId = null;
};

// --- RENDERERS ---
const renderQuotes = () => {
    const list = document.getElementById('quotes-list');
    list.innerHTML = window.dbData.quotes.map(q => {
        const c = window.dbData.clients.find(x => x.id === q.clientId)?.name || 'Cliente borrado';
        return `
            <div onclick="window.previewPDF('${q.id}')" class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-md transition-all cursor-pointer relative overflow-hidden group">
                <div class="absolute left-0 top-0 bottom-0 w-2 bg-blue-600 transition-all group-hover:w-3"></div>
                <div class="flex justify-between items-start pl-2">
                    <div>
                        <h4 class="font-black text-slate-800 text-lg uppercase tracking-tight">${q.title}</h4>
                        <p class="text-xs font-bold text-slate-400 mt-1">${c}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black text-blue-600">${q.total.toFixed(2)}€</p>
                        <button onclick="event.stopPropagation(); window.deleteDoc('quotes','${q.id}')" class="text-red-300 hover:text-red-500 mt-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <div class="mt-4 flex gap-2 pl-2">
                    <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-full font-bold uppercase">Toca para previsualizar PDF</span>
                </div>
            </div>
        `;
    }).join('') || '<p class="text-center text-slate-400 py-10 italic">No tienes proyectos guardados</p>';
    lucide.createIcons();
};

const renderItems = (col) => {
    const list = document.getElementById(`${col}-list`);
    list.innerHTML = window.dbData[col].map(item => `
        <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm">
            <span class="font-bold text-slate-700">${item.name} ${item.price ? `(${item.price}€)` : ''}</span>
            <button onclick="window.deleteDoc('${col}','${item.id}')" class="text-red-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>
    `).join('') || '<p class="col-span-full text-center text-slate-400 py-5 italic">Lista vacía</p>';
    lucide.createIcons();
};

// --- DATA ACTIONS ---
window.addMaterialToQuote = () => {
    const mid = document.getElementById('q-material').value;
    const qty = parseInt(document.getElementById('q-qty').value);
    const m = window.dbData.materials.find(x => x.id === mid);
    if(!m) return;
    window.currentQuoteItems.push({...m, qty, subtotal: m.price * qty});
    window.renderQuoteUI();
};

window.renderQuoteUI = () => {
    const list = document.getElementById('q-items-list');
    let total = 0;
    list.innerHTML = window.currentQuoteItems.map((item, i) => {
        total += item.subtotal;
        return `<li class="flex justify-between text-xs bg-white p-2 rounded-lg border">
            <span>${item.qty}x ${item.name}</span>
            <span class="font-bold">${item.subtotal.toFixed(2)}€</span>
        </li>`;
    }).join('');
    document.getElementById('q-total').innerText = total.toFixed(2) + " €";
};

window.saveQuote = async () => {
    const title = document.getElementById('q-title').value;
    const clientId = document.getElementById('q-client').value;
    if(!title || !clientId || window.currentQuoteItems.length === 0) return toast("Rellena todos los datos", true);
    
    const total = window.currentQuoteItems.reduce((acc, i) => acc + i.subtotal, 0);
    try {
        await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'quotes'), {
            title, clientId, items: window.currentQuoteItems, total, createdAt: serverTimestamp()
        });
        window.closeModals();
        toast("Proyecto guardado");
    } catch(e) { toast("Error al guardar", true); }
};

window.deleteDoc = async (col, id) => {
    if(!confirm("¿Borrar elemento?")) return;
    try {
        await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, col, id));
        toast("Eliminado");
    } catch(e) { toast("Error al borrar", true); }
};

window.openQuoteModal = () => {
    document.getElementById('q-client').innerHTML = window.dbData.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    document.getElementById('q-material').innerHTML = window.dbData.materials.map(m => `<option value="${m.id}">${m.name} (${m.price}€)</option>`).join('');
    window.currentQuoteItems = [];
    window.renderQuoteUI();
    document.getElementById('modal-quote').classList.remove('hidden');
    document.getElementById('modal-quote').classList.add('flex');
};

// --- PDF ENGINE ---
window.previewPDF = (id) => {
    const q = window.dbData.quotes.find(x => x.id === id);
    const client = window.dbData.clients.find(x => x.id === q.clientId);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Header
    doc.setFillColor(37, 99, 235);
    doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(22);
    doc.text("PRESUPUESTO ELÉCTRICO", 20, 25);
    
    // Info
    doc.setTextColor(40);
    doc.setFontSize(10);
    doc.text(`FECHA: ${new Date().toLocaleDateString()}`, 150, 50);
    doc.text(`PROYECTO: ${q.title.toUpperCase()}`, 20, 55);
    doc.text(`CLIENTE: ${client?.name || 'N/A'}`, 20, 62);
    
    // Table
    doc.autoTable({
        startY: 75,
        head: [['CONCEPTO', 'CANT.', 'PRECIO', 'SUBTOTAL']],
        body: q.items.map(i => [i.name, i.qty, i.price.toFixed(2)+'€', i.subtotal.toFixed(2)+'€']),
        foot: [['', '', 'TOTAL', q.total.toFixed(2)+'€']],
        theme: 'striped',
        headStyles: {fillColor: [37, 99, 235]}
    });

    const blob = doc.output('blob');
    const url = URL.createObjectURL(blob);
    document.getElementById('pdf-iframe').src = url;
    document.getElementById('btn-download-pdf').onclick = () => doc.save(`Presupuesto_${q.title}.pdf`);
    
    document.getElementById('modal-pdf-preview').classList.remove('hidden');
    document.getElementById('modal-pdf-preview').classList.add('flex');
};

// --- INITIALIZATION ---
onAuthStateChanged(auth, (user) => {
    const authScr = document.getElementById('auth-screen');
    if(user) {
        currentUser = user;
        authScr.classList.add('hidden');
        
        // Listeners en tiempo real
        const setupListener = (c, r) => onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, c), s => {
            window.dbData[c] = s.docs.map(d => ({id: d.id, ...d.data()}));
            r();
        });
        
        setupListener('clients', () => renderItems('clients'));
        setupListener('materials', () => renderItems('materials'));
        setupListener('quotes', renderQuotes);
    } else {
        currentUser = null;
        authScr.classList.remove('hidden');
    }
});

// Modales rápidos de creación para simplificar código
window.openClientModal = async () => {
    const name = prompt("Nombre del cliente:");
    if(name) await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'clients'), {name});
};
window.openMaterialModal = async () => {
    const name = prompt("Descripción material:");
    const price = parseFloat(prompt("Precio unitario (€):"));
    if(name && !isNaN(price)) await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'materials'), {name, price});
};

lucide.createIcons();
</script>
</body>
</html>
