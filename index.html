<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectriQuote Pro - Gestión Profesional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Librería para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
        }
        .active-tab { 
            color: #2563eb; 
            border-top: 3px solid #2563eb; 
            background: #eff6ff; 
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-24 text-slate-800">

<header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-3">
        <div class="bg-blue-600 p-2.5 rounded-xl text-white shadow-md shadow-blue-200">
            <i data-lucide="zap" class="w-5 h-5"></i>
        </div>
        <h1 class="text-xl font-extrabold tracking-tight text-slate-800">ELECTRI<span class="text-blue-600">QUOTE</span></h1>
    </div>
    <div id="connection-status" class="flex items-center gap-2">
        <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-full border border-emerald-100 uppercase tracking-tighter">Sincronizado</span>
    </div>
</header>

<main class="max-w-3xl mx-auto p-4 md:p-6">

    <!-- SECCIÓN: PROYECTOS -->
    <section id="view-quotes" class="space-y-6 fade-in">
        <div class="flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-slate-900">Proyectos</h2>
                <p class="text-slate-500 text-sm mt-1">Gestión de presupuestos</p>
            </div>
            <button onclick="window.openQuoteModal()" class="bg-blue-600 hover:bg-blue-700 transition-colors text-white px-5 py-3 rounded-2xl font-bold shadow-lg shadow-blue-200 flex items-center gap-2">
                <i data-lucide="plus-circle" class="w-5 h-5"></i> <span>Nuevo</span>
            </button>
        </div>
        <div id="quotes-list" class="grid gap-4 pt-2"></div>
    </section>

    <!-- SECCIÓN: MATERIALES -->
    <section id="view-materials" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-slate-900">Catálogo</h2>
                <p class="text-slate-500 text-sm mt-1">Materiales y servicios</p>
            </div>
            <button onclick="window.openMaterialModal()" class="bg-slate-900 hover:bg-slate-800 transition-colors text-white px-5 py-3 rounded-2xl font-bold flex items-center gap-2">
                <i data-lucide="plus" class="w-5 h-5"></i> Añadir
            </button>
        </div>
        <div id="materials-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>

    <!-- SECCIÓN: CLIENTES -->
    <section id="view-clients" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-slate-900">Clientes</h2>
                <p class="text-slate-500 text-sm mt-1">Cartera de contactos</p>
            </div>
            <button onclick="window.openClientModal()" class="bg-slate-900 hover:bg-slate-800 transition-colors text-white px-5 py-3 rounded-2xl font-bold flex items-center gap-2">
                <i data-lucide="user-plus" class="w-5 h-5"></i> Nuevo
            </button>
        </div>
        <div id="clients-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>

</main>

<!-- NAVEGACIÓN INFERIOR -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-20 z-40 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
    <button onclick="window.switchView('quotes')" id="nav-quotes" class="flex-1 flex flex-col items-center justify-center h-full active-tab">
        <i data-lucide="file-text" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold uppercase tracking-wider">Proyectos</span>
    </button>
    <button onclick="window.switchView('materials')" id="nav-materials" class="flex-1 flex flex-col items-center justify-center h-full text-slate-400">
        <i data-lucide="package" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold uppercase tracking-wider">Catálogo</span>
    </button>
    <button onclick="window.switchView('clients')" id="nav-clients" class="flex-1 flex flex-col items-center justify-center h-full text-slate-400">
        <i data-lucide="users" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold uppercase tracking-wider">Clientes</span>
    </button>
</nav>

<!-- MODAL: CLIENTE -->
<div id="modal-form" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex-col items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden fade-in">
        <div class="p-5 bg-slate-50 border-b flex justify-between items-center">
            <h3 class="font-bold text-lg text-slate-800" id="client-title">Cliente</h3>
            <button onclick="window.closeModals()" class="text-slate-400"><i data-lucide="x"></i></button>
        </div>
        <div class="p-6 space-y-4">
            <input id="f-name" placeholder="Nombre completo" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500">
            <input id="f-phone" placeholder="Teléfono" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500">
            <input id="f-addr" placeholder="Dirección" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500">
        </div>
        <div class="p-4 bg-slate-50 flex gap-3">
            <button onclick="window.closeModals()" class="flex-1 py-3 font-bold text-slate-600 bg-slate-200 rounded-xl">Cancelar</button>
            <button id="btn-save-client" onclick="window.saveClient()" class="flex-1 py-3 font-bold bg-blue-600 text-white rounded-xl">Guardar</button>
        </div>
    </div>
</div>

<!-- MODAL: MATERIAL -->
<div id="modal-material" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex-col items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden fade-in">
        <div class="p-5 bg-slate-50 border-b flex justify-between items-center">
            <h3 class="font-bold text-lg text-slate-800" id="material-title">Material</h3>
            <button onclick="window.closeModals()" class="text-slate-400"><i data-lucide="x"></i></button>
        </div>
        <div class="p-6 space-y-4">
            <input id="m-name" placeholder="Descripción del material" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500">
            <input id="m-price" type="number" step="0.01" placeholder="Precio unitario (€)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500">
        </div>
        <div class="p-4 bg-slate-50 flex gap-3">
            <button onclick="window.closeModals()" class="flex-1 py-3 font-bold text-slate-600 bg-slate-200 rounded-xl">Cancelar</button>
            <button id="btn-save-material" onclick="window.saveMaterial()" class="flex-1 py-3 font-bold bg-slate-900 text-white rounded-xl">Guardar</button>
        </div>
    </div>
</div>

<!-- MODAL: PRESUPUESTO -->
<div id="modal-quote" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex-col items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-xl rounded-[2rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh] fade-in">
        <div class="p-5 bg-slate-50 border-b flex justify-between items-center">
            <h3 class="font-bold text-lg text-slate-800" id="quote-modal-title">Presupuesto</h3>
            <div class="flex gap-2">
                <button id="btn-pdf-quote" onclick="window.downloadPDF()" class="hidden bg-emerald-100 text-emerald-700 p-2 rounded-lg hover:bg-emerald-200 transition-colors">
                    <i data-lucide="download" class="w-5 h-5"></i>
                </button>
                <button onclick="window.closeModals()" class="text-slate-400"><i data-lucide="x"></i></button>
            </div>
        </div>
        
        <div class="p-6 overflow-y-auto space-y-4 flex-1 custom-scrollbar">
            <input id="q-title" placeholder="Nombre del proyecto" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
            <select id="q-client" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl"></select>

            <div class="border border-slate-200 p-4 rounded-2xl bg-slate-50 space-y-3">
                <div class="flex gap-2">
                    <select id="q-material" class="flex-1 p-2 border border-slate-200 rounded-lg text-sm bg-white"></select>
                    <input id="q-qty" type="number" value="1" class="w-16 p-2 border border-slate-200 rounded-lg text-sm text-center bg-white">
                    <button onclick="window.addMaterialToQuote()" class="bg-blue-600 text-white px-3 rounded-lg"><i data-lucide="plus"></i></button>
                </div>
                <ul id="q-items-list" class="space-y-2"></ul>
                <div class="pt-3 border-t flex justify-between items-center">
                    <span class="font-bold text-slate-500">TOTAL</span>
                    <span class="text-2xl font-extrabold text-blue-600" id="q-total">0.00 €</span>
                </div>
            </div>
        </div>
        
        <div class="p-4 bg-slate-50 border-t flex gap-3">
            <button onclick="window.closeModals()" class="flex-1 py-3 font-bold text-slate-600 bg-slate-200 rounded-xl">Cerrar</button>
            <button id="btn-save-quote" onclick="window.saveQuote()" class="flex-1 py-3 font-bold bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-200">Guardar</button>
        </div>
    </div>
</div>

<div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-xl font-semibold text-sm transition-all duration-300 opacity-0 pointer-events-none z-[300]"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const appId = typeof __app_id !== 'undefined' ? __app_id : 'electri-pro-v3';
const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
    apiKey: "AIzaSyBuX9O3WBR5zX_L-WYdRiwirBl50aUFzlg",
    authDomain: "electriquote-b92c3.firebaseapp.com",
    projectId: "electriquote-b92c3"
};

let db, auth, currentUser;
window.dbData = { clients: [], materials: [], quotes: [] };
window.currentQuoteItems = [];
window.editingId = null; 

// --- CORE ---
const showToast = (msg, isError = false) => {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.className = `fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-semibold text-sm transition-all duration-300 z-[300] ${isError ? 'bg-red-600' : 'bg-slate-800'} text-white opacity-100`;
    setTimeout(() => t.classList.add('opacity-0'), 2500);
};

window.switchView = (v) => {
    ['quotes','materials','clients'].forEach(s => {
        document.getElementById('view-'+s).classList.add('hidden');
        document.getElementById('nav-'+s).className = 'flex-1 flex flex-col items-center justify-center h-full text-slate-400';
    });
    document.getElementById('view-'+v).classList.remove('hidden');
    document.getElementById('nav-'+v).className = 'flex-1 flex flex-col items-center justify-center h-full active-tab';
};

window.closeModals = () => {
    document.querySelectorAll('[id^="modal-"]').forEach(m => m.classList.add('hidden'));
    window.editingId = null;
};

// --- RENDERERS ---
window.renderClients = () => {
    const list = document.getElementById('clients-list');
    list.innerHTML = window.dbData.clients.map(c => `
        <div onclick="window.editClient('${c.id}')" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center hover:border-blue-300 cursor-pointer">
            <div>
                <div class="font-bold text-slate-800 text-lg">${c.name}</div>
                <div class="text-sm text-slate-500">${c.phone || 'Sin tel.'}</div>
            </div>
            <button onclick="event.stopPropagation(); window.deleteRecord('clients', '${c.id}')" class="p-2 text-red-300 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
        </div>
    `).join('') || '<p class="col-span-full text-center text-slate-400 py-10">Sin clientes</p>';
    lucide.createIcons();
};

window.renderMaterials = () => {
    const list = document.getElementById('materials-list');
    list.innerHTML = window.dbData.materials.map(m => `
        <div onclick="window.editMaterial('${m.id}')" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center hover:border-blue-300 cursor-pointer">
            <div>
                <div class="font-bold text-slate-800">${m.name}</div>
                <div class="text-blue-600 font-extrabold">${m.price.toFixed(2)} €</div>
            </div>
            <button onclick="event.stopPropagation(); window.deleteRecord('materials', '${m.id}')" class="p-2 text-red-300 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
        </div>
    `).join('') || '<p class="col-span-full text-center text-slate-400 py-10">Sin materiales</p>';
    lucide.createIcons();
};

window.renderQuotes = () => {
    const list = document.getElementById('quotes-list');
    list.innerHTML = window.dbData.quotes.map(q => {
        const client = window.dbData.clients.find(c => c.id === q.clientId)?.name || 'Desconocido';
        return `
        <div onclick="window.editQuote('${q.id}')" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center hover:shadow-md cursor-pointer relative overflow-hidden">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500"></div>
            <div>
                <div class="font-bold text-slate-900 text-lg">${q.title}</div>
                <div class="text-sm text-slate-500">${client}</div>
            </div>
            <div class="text-right">
                <div class="font-extrabold text-xl text-blue-700">${q.total.toFixed(2)} €</div>
                <button onclick="event.stopPropagation(); window.deleteRecord('quotes', '${q.id}')" class="text-xs text-red-400 font-bold uppercase mt-1">Eliminar</button>
            </div>
        </div>
    `}).join('') || '<p class="text-center text-slate-400 py-10">No hay presupuestos</p>';
    lucide.createIcons();
};

// --- DATA LOGIC ---
window.saveClient = async () => {
    const name = document.getElementById('f-name').value.trim();
    if(!name) return showToast("Nombre requerido", true);
    const data = { name, phone: document.getElementById('f-phone').value, address: document.getElementById('f-addr').value };
    try {
        const col = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'clients');
        if(window.editingId) await updateDoc(doc(col, window.editingId), data);
        else await addDoc(col, {...data, createdAt: serverTimestamp()});
        window.closeModals(); showToast("Cliente guardado");
    } catch(e) { showToast("Error al guardar", true); }
};

window.editClient = (id) => {
    const c = window.dbData.clients.find(x => x.id === id);
    window.editingId = id;
    document.getElementById('f-name').value = c.name;
    document.getElementById('f-phone').value = c.phone || '';
    document.getElementById('f-addr').value = c.address || '';
    document.getElementById('client-title').innerText = "Editar Cliente";
    document.getElementById('btn-save-client').innerText = "Actualizar";
    document.getElementById('modal-form').classList.remove('hidden');
};

window.openClientModal = () => {
    window.editingId = null;
    document.getElementById('f-name').value = '';
    document.getElementById('f-phone').value = '';
    document.getElementById('f-addr').value = '';
    document.getElementById('client-title').innerText = "Nuevo Cliente";
    document.getElementById('btn-save-client').innerText = "Guardar";
    document.getElementById('modal-form').classList.remove('hidden');
};

window.saveMaterial = async () => {
    const name = document.getElementById('m-name').value.trim();
    const price = parseFloat(document.getElementById('m-price').value || 0);
    if(!name) return showToast("Nombre requerido", true);
    const data = { name, price };
    try {
        const col = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'materials');
        if(window.editingId) await updateDoc(doc(col, window.editingId), data);
        else await addDoc(col, {...data, createdAt: serverTimestamp()});
        window.closeModals(); showToast("Material guardado");
    } catch(e) { showToast("Error al guardar", true); }
};

window.editMaterial = (id) => {
    const m = window.dbData.materials.find(x => x.id === id);
    window.editingId = id;
    document.getElementById('m-name').value = m.name;
    document.getElementById('m-price').value = m.price;
    document.getElementById('material-title').innerText = "Editar Material";
    document.getElementById('btn-save-material').innerText = "Actualizar";
    document.getElementById('modal-material').classList.remove('hidden');
};

window.openMaterialModal = () => {
    window.editingId = null;
    document.getElementById('m-name').value = '';
    document.getElementById('m-price').value = '';
    document.getElementById('material-title').innerText = "Nuevo Material";
    document.getElementById('btn-save-material').innerText = "Guardar";
    document.getElementById('modal-material').classList.remove('hidden');
};

// --- QUOTE LOGIC ---
window.openQuoteModal = () => {
    window.editingId = null;
    window.currentQuoteItems = [];
    document.getElementById('q-title').value = '';
    document.getElementById('quote-modal-title').innerText = "Nuevo Presupuesto";
    document.getElementById('btn-save-quote').innerText = "Crear Proyecto";
    document.getElementById('btn-pdf-quote').classList.add('hidden');
    
    // Selects
    document.getElementById('q-client').innerHTML = `<option value="">Seleccionar cliente</option>` + window.dbData.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    document.getElementById('q-material').innerHTML = window.dbData.materials.map(m => `<option value="${m.id}">${m.name} (${m.price.toFixed(2)}€)</option>`).join('');
    
    window.renderQuoteItemsList();
    document.getElementById('modal-quote').classList.remove('hidden');
};

window.editQuote = (id) => {
    const q = window.dbData.quotes.find(x => x.id === id);
    window.editingId = id;
    window.currentQuoteItems = [...q.items];
    
    document.getElementById('quote-modal-title').innerText = "Editar Presupuesto";
    document.getElementById('btn-save-quote').innerText = "Actualizar Proyecto";
    document.getElementById('btn-pdf-quote').classList.remove('hidden');
    
    document.getElementById('q-title').value = q.title;
    document.getElementById('q-client').innerHTML = window.dbData.clients.map(c => `<option value="${c.id}" ${c.id === q.clientId ? 'selected' : ''}>${c.name}</option>`).join('');
    document.getElementById('q-material').innerHTML = window.dbData.materials.map(m => `<option value="${m.id}">${m.name} (${m.price.toFixed(2)}€)</option>`).join('');
    
    window.renderQuoteItemsList();
    document.getElementById('modal-quote').classList.remove('hidden');
};

window.addMaterialToQuote = () => {
    const mid = document.getElementById('q-material').value;
    const qty = parseInt(document.getElementById('q-qty').value || 1);
    const mat = window.dbData.materials.find(m => m.id === mid);
    if(!mat) return;
    window.currentQuoteItems.push({ ...mat, qty, subtotal: mat.price * qty });
    window.renderQuoteItemsList();
};

window.renderQuoteItemsList = () => {
    const list = document.getElementById('q-items-list');
    let total = 0;
    list.innerHTML = window.currentQuoteItems.map((item, i) => {
        total += item.subtotal;
        return `<li class="flex justify-between items-center text-sm bg-white p-2 rounded-lg border">
            <span><b>${item.qty}x</b> ${item.name}</span>
            <div class="flex items-center gap-3">
                <span class="font-bold">${item.subtotal.toFixed(2)}€</span>
                <button onclick="window.currentQuoteItems.splice(${i},1); window.renderQuoteItemsList();" class="text-red-400"><i data-lucide="minus-circle" class="w-4 h-4"></i></button>
            </div>
        </li>`
    }).join('');
    document.getElementById('q-total').innerText = total.toFixed(2) + " €";
    lucide.createIcons();
};

window.saveQuote = async () => {
    const title = document.getElementById('q-title').value.trim();
    const clientId = document.getElementById('q-client').value;
    if(!title || !clientId || window.currentQuoteItems.length === 0) return showToast("Datos incompletos", true);
    
    const total = window.currentQuoteItems.reduce((a,b) => a + b.subtotal, 0);
    const data = { title, clientId, items: window.currentQuoteItems, total };
    
    try {
        const col = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'quotes');
        if(window.editingId) await updateDoc(doc(col, window.editingId), data);
        else await addDoc(col, {...data, createdAt: serverTimestamp()});
        window.closeModals(); showToast("Presupuesto guardado");
    } catch(e) { showToast("Error al guardar", true); }
};

window.deleteRecord = async (col, id) => {
    try {
        await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, col, id));
        showToast("Eliminado con éxito");
    } catch(e) { showToast("Error al eliminar", true); }
};

// --- PDF GENERATOR ---
window.downloadPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const quote = window.dbData.quotes.find(q => q.id === window.editingId);
    const client = window.dbData.clients.find(c => c.id === quote.clientId);
    
    // Estética Header
    doc.setFillColor(37, 99, 235);
    doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(24);
    doc.text("PRESUPUESTO", 20, 25);
    doc.setFontSize(10);
    doc.text(new Date().toLocaleDateString(), 170, 25);
    
    // Info Cliente
    doc.setTextColor(50, 50, 50);
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text("CLIENTE:", 20, 55);
    doc.setFont(undefined, 'normal');
    doc.text(client?.name || "Desconocido", 20, 62);
    doc.text(client?.phone || "-", 20, 68);
    doc.text(client?.address || "-", 20, 74);
    
    // Proyecto
    doc.setFont(undefined, 'bold');
    doc.text("PROYECTO:", 120, 55);
    doc.setFont(undefined, 'normal');
    doc.text(quote.title, 120, 62);

    // Tabla de Items
    const body = quote.items.map(i => [i.name, i.qty, i.price.toFixed(2) + " €", i.subtotal.toFixed(2) + " €"]);
    doc.autoTable({
        startY: 85,
        head: [['Concepto', 'Cant.', 'Precio Unit.', 'Subtotal']],
        body: body,
        headStyles: { fillColor: [37, 99, 235] },
        foot: [['', '', 'TOTAL', quote.total.toFixed(2) + " €"]],
        footStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold' },
        theme: 'grid'
    });

    doc.setFontSize(9);
    doc.setTextColor(150, 150, 150);
    doc.text("Este presupuesto tiene una validez de 15 días.", 20, doc.lastAutoTable.finalY + 20);
    doc.text("Gracias por su confianza.", 20, doc.lastAutoTable.finalY + 25);
    
    doc.save(`Presupuesto_${quote.title.replace(/\s+/g, '_')}.pdf`);
};

// --- INIT ---
async function init() {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    auth = getAuth(app);
    
    onAuthStateChanged(auth, (user) => {
        if(!user) { signInAnonymously(auth); return; }
        currentUser = user;
        
        // Listeners
        const listen = (c, fn) => onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, c), s => {
            window.dbData[c] = s.docs.map(d => ({id: d.id, ...d.data()}));
            fn();
        });
        
        listen('clients', window.renderClients);
        listen('materials', window.renderMaterials);
        listen('quotes', window.renderQuotes);
    });
}

window.addEventListener('load', init);
</script>
