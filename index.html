<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectriQuote Pro - Sistema de Gestión</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .active-tab { color: #2563eb; border-top: 3px solid #2563eb; background: white; }
        #pdf-render-zone { position: absolute; left: -9999px; top: 0; width: 210mm; background: white; }
        input, select, button { outline: none !important; }
    </style>
</head>
<body class="min-h-screen pb-20">

<header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-40 flex justify-between items-center">
    <div class="flex items-center gap-2">
        <div class="bg-blue-600 p-2 rounded-lg text-white font-bold">⚡</div>
        <h1 class="text-lg font-extrabold tracking-tight text-slate-800">ELECTRI<span class="text-blue-600">QUOTE</span></h1>
    </div>
    <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-300"></div>
</header>

<main class="max-w-2xl mx-auto p-4">

    <!-- PROYECTOS -->
    <section id="view-quotes" class="space-y-4">
        <div class="flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-bold text-slate-900">Proyectos</h2>
                <p class="text-slate-500 text-sm">Gestión de presupuestos</p>
            </div>
            <button onclick="window.openQuoteModal()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold">Nuevo +</button>
        </div>
        <div id="quotes-list" class="grid gap-3 pt-4">
            <div class="bg-white p-6 rounded-3xl text-center text-slate-400">Cargando...</div>
        </div>
    </section>

    <!-- MATERIALES -->
    <section id="view-materials" class="hidden space-y-4">
        <div class="flex justify-between items-end">
            <h2 class="text-2xl font-bold">Catálogo</h2>
            <button onclick="window.openMaterialModal()" class="bg-slate-900 text-white px-5 py-2 rounded-xl">Añadir</button>
        </div>
        <div id="materials-list"></div>
    </section>

    <!-- CLIENTES -->
    <section id="view-clients" class="hidden space-y-4">
        <div class="flex justify-between items-end">
            <h2 class="text-2xl font-bold">Clientes</h2>
            <button onclick="window.openClientModal()" class="bg-slate-900 text-white px-5 py-2 rounded-xl">Nuevo</button>
        </div>
        <div id="clients-list"></div>
    </section>

</main>

<!-- NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around h-16">
    <button onclick="window.switchView('quotes')" id="nav-quotes" class="flex-1 active-tab">📋</button>
    <button onclick="window.switchView('materials')" id="nav-materials" class="flex-1">📦</button>
    <button onclick="window.switchView('clients')" id="nav-clients" class="flex-1">👥</button>
</nav>

<!-- MODALS -->
<div id="modal-quote" class="hidden"></div>
<div id="modal-form" class="hidden"></div>
<div id="pdf-render-zone"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

let db, auth;
const appId = 'electri-pro-v2';

window.dbData = { clients: [], materials: [], quotes: [] };
window.currentQuoteItems = [];
window.editingId = null;

// 🔥 FIREBASE CONFIG FIX REAL
const firebaseConfig = (typeof __firebase_config !== 'undefined')
    ? JSON.parse(__firebase_config)
    : {
        apiKey: "AIzaSyBuX9O3WBR5zX_L-WYdRiwirBl50aUFzlg",
        authDomain: "electriquote-b92c3.firebaseapp.com",
        projectId: "electriquote-b92c3,
        storageBucket: "electriquote-b92c3.firebasestorage.app",
        messagingSenderId: "1050154424016",
        appId: "1:1050154424016:web:10e5250c9b78c17bb7b0d5"
    };

function switchView(v) {
    ['quotes','materials','clients'].forEach(s => {
        document.getElementById('view-'+s)?.classList.add('hidden');
        document.getElementById('nav-'+s)?.classList.remove('active-tab');
    });
    document.getElementById('view-'+v)?.classList.remove('hidden');
    document.getElementById('nav-'+v)?.classList.add('active-tab');
}
window.switchView = switchView;

window.closeModals = () => {
    document.getElementById('modal-quote').classList.add('hidden');
    document.getElementById('modal-form').classList.add('hidden');
};

// ================= FIREBASE START =================

async function start() {
    const dot = document.getElementById('status-dot');
    dot.className = 'w-3 h-3 bg-yellow-500 rounded-full';

    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    auth = getAuth(app);

    try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    } catch (e) {
        console.error(e);
        await signInAnonymously(auth);
    }

    onAuthStateChanged(auth, (user) => {
        if (!user) return;

        dot.className = 'w-3 h-3 bg-green-500 rounded-full';

        onSnapshot(collection(db,'artifacts',appId,'public','data','clients'), s => {
            window.dbData.clients = s.docs.map(d => ({id:d.id,...d.data()}));
            document.getElementById('clients-list').innerHTML = window.dbData.clients.map(c=>
                `<div class="p-3 bg-white mb-2 rounded-xl">${c.name}</div>`
            ).join('');
        });

        onSnapshot(collection(db,'artifacts',appId,'public','data','materials'), s => {
            window.dbData.materials = s.docs.map(d => ({id:d.id,...d.data()}));
            document.getElementById('materials-list').innerHTML = window.dbData.materials.map(m=>
                `<div class="p-3 bg-white mb-2 rounded-xl">${m.name} - ${m.price}€</div>`
            ).join('');
        });

        onSnapshot(collection(db,'artifacts',appId,'public','data','quotes'), s => {
            window.dbData.quotes = s.docs.map(d => ({id:d.id,...d.data()}));
            document.getElementById('quotes-list').innerHTML = window.dbData.quotes.map(q=>
                `<div class="p-4 bg-white mb-2 rounded-xl">${q.clientName} - ${q.total}€</div>`
            ).join('');
        });
    });
}

window.addEventListener('load', start);
</script>

</body>
</html>
