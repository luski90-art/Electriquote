<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectriQuote Pro - Acceso Total</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .active-tab { color: #0f172a; border-top: 3px solid #0f172a; background: #f1f5f9; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0f172a; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-24 text-slate-800">

<!-- PANTALLA DE ACCESO -->
<div id="auth-screen" class="fixed inset-0 bg-slate-900 z-[999] flex flex-col items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-10 fade-in text-center">
        <div class="bg-slate-900 w-16 h-16 rounded-2xl text-white flex items-center justify-center mx-auto mb-6">
            <i data-lucide="user-check" class="w-8 h-8"></i>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900">Bienvenido</h2>
        <p class="text-slate-500 text-sm mt-2 mb-8">Accede para sincronizar en la nube</p>
        
        <div class="space-y-3">
            <input id="email-input" type="email" placeholder="Tu Email" class="w-full p-4 border border-slate-200 rounded-xl outline-none focus:ring-2 ring-slate-900 transition-all">
            <input id="pass-input" type="password" placeholder="Tu Contraseña" class="w-full p-4 border border-slate-200 rounded-xl outline-none focus:ring-2 ring-slate-900 transition-all">
        </div>
        
        <p id="auth-error-msg" class="text-red-500 text-xs mt-4 font-bold hidden"></p>

        <div class="flex flex-col gap-3 mt-6">
            <button id="btn-action-login" onclick="window.processAuth('login')" class="w-full py-4 bg-slate-900 text-white font-bold rounded-xl shadow-lg hover:bg-slate-800 flex items-center justify-center gap-2">
                <span>Iniciar Sesión</span>
            </button>
            <button id="btn-action-signup" onclick="window.processAuth('signup')" class="w-full py-4 border-2 border-slate-900 text-slate-900 font-bold rounded-xl hover:bg-slate-50 flex items-center justify-center gap-2">
                <span>Crear una Cuenta</span>
            </button>
        </div>
    </div>
</div>

<!-- CABECERA -->
<header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-3">
        <div class="bg-slate-900 p-2 rounded-lg text-white"><i data-lucide="zap" class="w-5 h-5"></i></div>
        <h1 class="text-lg font-black text-slate-900">ELECTRIQUOTE</h1>
    </div>
    <div class="flex items-center gap-3">
        <button onclick="window.doLogout()" class="p-2 text-slate-400 hover:text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-300"></div>
    </div>
</header>

<main class="max-w-4xl mx-auto p-4">
    <!-- VISTAS -->
    <section id="view-quotes" class="space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold">Proyectos</h2>
            <button onclick="window.openQuoteModal()" class="bg-slate-900 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg"><i data-lucide="plus"></i> Nuevo</button>
        </div>
        <div id="quotes-list" class="grid gap-4"></div>
    </section>

    <section id="view-materials" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold">Materiales</h2>
            <button onclick="window.openMaterialModal()" class="bg-slate-900 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2"><i data-lucide="plus"></i> Añadir</button>
        </div>
        <div id="materials-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>

    <section id="view-clients" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold">Clientes</h2>
            <button onclick="window.openClientModal()" class="bg-slate-900 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2"><i data-lucide="user-plus"></i> Nuevo</button>
        </div>
        <div id="clients-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-20 z-40 shadow-lg">
    <button onclick="window.switchView('quotes')" id="nav-quotes" class="flex-1 flex flex-col items-center justify-center active-tab h-full">
        <i data-lucide="layout-grid" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold">PROYECTOS</span>
    </button>
    <button onclick="window.switchView('materials')" id="nav-materials" class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full">
        <i data-lucide="package" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold">CATÁLOGO</span>
    </button>
    <button onclick="window.switchView('clients')" id="nav-clients" class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full">
        <i data-lucide="users" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold">CLIENTES</span>
    </button>
</nav>

<!-- MODALES -->
<div id="modal-client" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-sm rounded-[1.5rem] p-6 space-y-4">
        <h3 class="font-black text-xl" id="client-title-modal">Cliente</h3>
        <input id="cl-name" placeholder="Nombre" class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
        <input id="cl-phone" placeholder="Teléfono" class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
        <input id="cl-address" placeholder="Dirección" class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
        <button onclick="window.saveClientData()" class="w-full py-4 bg-slate-900 text-white font-bold rounded-xl">Guardar</button>
        <button onclick="window.closeAllModals()" class="w-full text-slate-400 text-sm">Cerrar</button>
    </div>
</div>

<div id="modal-material" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-sm rounded-[1.5rem] p-6 space-y-4">
        <h3 class="font-black text-xl" id="mat-title-modal">Material</h3>
        <input id="mt-name" placeholder="Nombre Material" class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
        <input id="mt-price" type="number" step="0.01" placeholder="Precio €" class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
        <button onclick="window.saveMaterialData()" class="w-full py-4 bg-slate-900 text-white font-bold rounded-xl">Guardar</button>
        <button onclick="window.closeAllModals()" class="w-full text-slate-400 text-sm">Cerrar</button>
    </div>
</div>

<div id="modal-quote" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-xl rounded-[2rem] overflow-hidden flex flex-col max-h-[85vh]">
        <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
            <h3 class="font-black text-xl">Nuevo Presupuesto</h3>
            <button onclick="window.closeAllModals()"><i data-lucide="x"></i></button>
        </div>
        <div class="p-6 overflow-y-auto space-y-4 flex-1">
            <input id="q-ref" placeholder="Referencia Proyecto" class="w-full p-4 border rounded-xl font-bold">
            <select id="q-cl-select" class="w-full p-4 border rounded-xl"></select>
            <div class="bg-slate-50 p-4 rounded-xl border">
                <div class="flex gap-2 mb-4">
                    <select id="q-mt-select" class="flex-1 p-3 border rounded-xl"></select>
                    <input id="q-mt-qty" type="number" value="1" class="w-16 p-3 border rounded-xl text-center">
                    <button onclick="window.addItemToQuote()" class="bg-slate-900 text-white px-4 rounded-xl"><i data-lucide="plus"></i></button>
                </div>
                <ul id="q-items-list" class="space-y-2"></ul>
                <div class="mt-4 pt-4 border-t flex justify-between font-black">
                    <span>TOTAL</span>
                    <span id="q-total-val">0.00 €</span>
                </div>
            </div>
        </div>
        <div class="p-6 border-t"><button onclick="window.saveFinalQuote()" class="w-full py-4 bg-slate-900 text-white font-bold rounded-xl text-lg uppercase tracking-wider">Guardar Presupuesto</button></div>
    </div>
</div>

<div id="modal-pdf" class="fixed inset-0 bg-slate-900/90 hidden items-center justify-center p-4 z-[200]">
    <div class="bg-white w-full max-w-4xl h-[90vh] rounded-[1.5rem] flex flex-col overflow-hidden shadow-2xl">
        <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
            <span class="font-bold">Vista Previa PDF</span>
            <button onclick="window.closeAllModals()"><i data-lucide="x"></i></button>
        </div>
        <iframe id="pdf-frame" class="flex-1 border-none"></iframe>
        <div class="p-4 flex gap-2">
            <button id="btn-dl-pdf" class="flex-1 py-4 bg-slate-900 text-white font-bold rounded-xl uppercase">Descargar</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

// ==============================================================================
// 🟢 CONFIGURACIÓN FIREBASE ACTUALIZADA CON TUS DATOS
// ==============================================================================
const firebaseConfig = {
    apiKey: "AIzaSyBuX9O3WBR5zX_L-WYdRiwirBl50aUFzlg",
    authDomain: "electriquote-b92c3.firebaseapp.com",
    projectId: "electriquote-b92c3",
    storageBucket: "electriquote-b92c3.firebasestorage.app",
    messagingSenderId: "1050154424016",
    appId: "1:1050154424016:web:10e5250c9b78c17bb7b0d5"
};
// ==============================================================================

const appId = 'electri-pro-final';
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Persistencia local para mantener la sesión iniciada al cerrar la pestaña
setPersistence(auth, browserLocalPersistence).catch(console.error);

let user = null;
window.data = { clients: [], materials: [], quotes: [] };
window.tempItems = [];
window.editingId = null;
window.dbListeners = [];

// --- SISTEMA DE AUTENTICACIÓN ---
window.processAuth = async (mode) => {
    const errEl = document.getElementById('auth-error-msg');
    const btn = document.getElementById(`btn-action-${mode}`);
    const originalText = btn.innerHTML;

    const email = document.getElementById('email-input').value.trim();
    const pass = document.getElementById('pass-input').value.trim();
    
    if (!email || !pass) {
        errEl.innerText = "Introduce email y contraseña";
        errEl.classList.remove('hidden');
        return;
    }

    errEl.classList.add('hidden');
    btn.innerHTML = `<div class="loading-spinner" style="margin: 0 auto;"></div>`;
    btn.disabled = true;

    try {
        if (mode === 'login') {
            await signInWithEmailAndPassword(auth, email, pass);
        } else {
            await createUserWithEmailAndPassword(auth, email, pass);
        }
    } catch (e) {
        console.error("Auth Error:", e);
        let msg = "Error de conexión";
        if(e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password') msg = "Credenciales incorrectas";
        if(e.code === 'auth/user-not-found') msg = "Usuario no registrado";
        if(e.code === 'auth/email-already-in-use') msg = "El email ya está en uso";
        if(e.code === 'auth/weak-password') msg = "Contraseña débil (mín. 6 car.)";
        errEl.innerText = msg;
        errEl.classList.remove('hidden');
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
};

window.doLogout = async () => { 
    try { await signOut(auth); } catch (e) { console.error(e); }
};

// --- NAVEGACIÓN ---
window.switchView = (v) => {
    ['quotes','materials','clients'].forEach(x => {
        document.getElementById('view-'+x).classList.add('hidden');
        document.getElementById('nav-'+x).className = "flex-1 flex flex-col items-center justify-center text-slate-400 h-full";
    });
    document.getElementById('view-'+v).classList.remove('hidden');
    document.getElementById('nav-'+v).className = "flex-1 flex flex-col items-center justify-center active-tab h-full";
};

window.closeAllModals = () => {
    document.querySelectorAll('[id^="modal-"]').forEach(m => {
        m.classList.remove('flex');
        m.classList.add('hidden');
    });
    window.editingId = null;
};

// --- SINCRONIZACIÓN FIREBASE (REALTIME) ---
const syncCol = (name, cb) => {
    if(!user) return () => {}; 
    const path = collection(db, 'artifacts', appId, 'users', user.uid, name);
    return onSnapshot(path, s => {
        window.data[name] = s.docs.map(d => ({id: d.id, ...d.data()}));
        cb();
    }, (err) => console.error(`Error Sync ${name}:`, err));
};

// --- CLIENTES ---
window.openClientModal = (id = null) => {
    window.editingId = id;
    const item = id ? window.data.clients.find(x => x.id === id) : null;
    document.getElementById('cl-name').value = item ? item.name : '';
    document.getElementById('cl-phone').value = item ? item.phone : '';
    document.getElementById('cl-address').value = item ? item.address : '';
    document.getElementById('client-title-modal').innerText = id ? 'Editar Cliente' : 'Nuevo Cliente';
    document.getElementById('modal-client').classList.replace('hidden', 'flex');
};

window.saveClientData = async () => {
    const d = { name: document.getElementById('cl-name').value, phone: document.getElementById('cl-phone').value, address: document.getElementById('cl-address').value, up: serverTimestamp() };
    if(!d.name) return;
    const c = collection(db, 'artifacts', appId, 'users', user.uid, 'clients');
    if(window.editingId) await updateDoc(doc(c, window.editingId), d);
    else await addDoc(c, d);
    window.closeAllModals();
};

// --- MATERIALES ---
window.openMaterialModal = (id = null) => {
    window.editingId = id;
    const item = id ? window.data.materials.find(x => x.id === id) : null;
    document.getElementById('mt-name').value = item ? item.name : '';
    document.getElementById('mt-price').value = item ? item.price : '';
    document.getElementById('mat-title-modal').innerText = id ? 'Editar Material' : 'Nuevo Material';
    document.getElementById('modal-material').classList.replace('hidden', 'flex');
};

window.saveMaterialData = async () => {
    const d = { name: document.getElementById('mt-name').value, price: parseFloat(document.getElementById('mt-price').value), up: serverTimestamp() };
    if(!d.name || isNaN(d.price)) return;
    const c = collection(db, 'artifacts', appId, 'users', user.uid, 'materials');
    if(window.editingId) await updateDoc(doc(c, window.editingId), d);
    else await addDoc(c, d);
    window.closeAllModals();
};

// --- PRESUPUESTOS ---
window.openQuoteModal = () => {
    if(window.data.clients.length === 0) {
        alert("Primero crea al menos un cliente.");
        return;
    }
    document.getElementById('q-cl-select').innerHTML = window.data.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    document.getElementById('q-mt-select').innerHTML = window.data.materials.map(m => `<option value="${m.id}">${m.name} (${m.price.toFixed(2)}€)</option>`).join('');
    window.tempItems = [];
    document.getElementById('q-ref').value = "";
    window.renderQuoteList();
    document.getElementById('modal-quote').classList.replace('hidden', 'flex');
};

window.addItemToQuote = () => {
    const mid = document.getElementById('q-mt-select').value;
    const qty = parseInt(document.getElementById('q-mt-qty').value);
    const m = window.data.materials.find(x => x.id === mid);
    if(!m) return;
    window.tempItems.push({...m, qty, sub: m.price * qty});
    window.renderQuoteList();
};

window.renderQuoteList = () => {
    const list = document.getElementById('q-items-list');
    let total = 0;
    list.innerHTML = window.tempItems.map((it, i) => {
        total += it.sub;
        return `<li class="flex justify-between p-2 bg-white rounded border text-sm"><span>${it.qty} x ${it.name}</span><b>${it.sub.toFixed(2)}€</b></li>`;
    }).join('');
    document.getElementById('q-total-val').innerText = total.toFixed(2) + " €";
};

window.saveFinalQuote = async () => {
    const ref = document.getElementById('q-ref').value;
    const cid = document.getElementById('q-cl-select').value;
    if(!ref || window.tempItems.length === 0) return;
    const total = window.tempItems.reduce((a,b)=>a+b.sub,0);
    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'quotes'), { ref, clientId: cid, items: window.tempItems, total, date: serverTimestamp() });
    window.closeAllModals();
};

window.delItem = async (col, id, e) => {
    e.stopPropagation();
    if(confirm("¿Eliminar?")) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, col, id));
};

// --- RENDERERS ---
const renderCls = () => {
    document.getElementById('clients-list').innerHTML = window.data.clients.map(c => `
        <div onclick="window.openClientModal('${c.id}')" class="bg-white p-4 rounded-xl border flex justify-between items-center cursor-pointer hover:border-slate-400">
            <div><b class="block uppercase">${c.name}</b><small class="text-slate-400">${c.phone}</small></div>
            <button onclick="window.delItem('clients','${c.id}',event)" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>`).join('');
    lucide.createIcons();
};

const renderMats = () => {
    document.getElementById('materials-list').innerHTML = window.data.materials.map(m => `
        <div onclick="window.openMaterialModal('${m.id}')" class="bg-white p-4 rounded-xl border flex justify-between items-center cursor-pointer hover:border-slate-400">
            <div><b class="block uppercase">${m.name}</b><small class="text-slate-400">${m.price.toFixed(2)}€</small></div>
            <button onclick="window.delItem('materials','${m.id}',event)" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>`).join('');
    lucide.createIcons();
};

const renderQts = () => {
    document.getElementById('quotes-list').innerHTML = window.data.quotes.map(q => {
        const c = window.data.clients.find(x => x.id === q.clientId)?.name || 'N/A';
        return `
        <div onclick="window.genPDF('${q.id}')" class="bg-white p-5 rounded-2xl border-l-8 border-slate-900 shadow-sm flex justify-between items-center cursor-pointer hover:shadow-md transition-shadow">
            <div><b class="text-lg uppercase">${q.ref}</b><p class="text-xs text-slate-400 uppercase">${c}</p></div>
            <div class="text-right"><b>${q.total.toFixed(2)} €</b><br><button onclick="window.delItem('quotes','${q.id}',event)" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>
        </div>`;
    }).join('');
    lucide.createIcons();
};

// --- PDF ---
window.genPDF = (id) => {
    const q = window.data.quotes.find(x => x.id === id);
    const client = window.data.clients.find(x => x.id === q.clientId);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFillColor(15, 23, 42);
    doc.rect(0, 0, 210, 35, 'F');
    doc.setFont("helvetica", "bold");
    doc.setFontSize(22);
    doc.setTextColor(255);
    doc.text("PRESUPUESTO", 20, 22);
    
    doc.setFontSize(10);
    doc.text("EMISOR:", 20, 45);
    doc.text("CLIENTE:", 120, 45);
    
    doc.setTextColor(50);
    doc.text("ELECTRIQUOTE PRO SERVICES", 20, 52);
    doc.text(user.email, 20, 57);
    
    doc.setTextColor(0);
    doc.text(client?.name.toUpperCase() || 'N/A', 120, 52);
    doc.setTextColor(100);
    doc.text(client?.phone || '-', 120, 57);
    doc.text(client?.address || '-', 120, 62);

    doc.autoTable({
        startY: 75,
        head: [['DESCRIPCIÓN', 'CANT.', 'PRECIO', 'TOTAL']],
        body: q.items.map(i => [i.name.toUpperCase(), i.qty, i.price.toFixed(2)+'€', i.sub.toFixed(2)+'€']),
        foot: [['', '', 'TOTAL BASE:', q.total.toFixed(2)+'€']],
        theme: 'striped',
        headStyles: { fillColor: [15, 23, 42] }
    });

    document.getElementById('pdf-frame').src = URL.createObjectURL(doc.output('blob'));
    document.getElementById('btn-dl-pdf').onclick = () => doc.save(`Presupuesto_${q.ref}.pdf`);
    document.getElementById('modal-pdf').classList.replace('hidden', 'flex');
};

// --- MONITORIZAR ESTADO DE USUARIO ---
onAuthStateChanged(auth, u => {
    user = u;
    window.dbListeners.forEach(unsub => unsub());
    window.dbListeners = [];

    if(u) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-emerald-500";
        window.dbListeners.push(syncCol('clients', renderCls));
        window.dbListeners.push(syncCol('materials', renderMats));
        window.dbListeners.push(syncCol('quotes', renderQts));
    } else {
        document.getElementById('auth-screen').classList.replace('hidden', 'flex');
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-slate-300";
        window.data = { clients: [], materials: [], quotes: [] };
        renderCls(); renderMats(); renderQts();
    }
});

lucide.createIcons();
</script>
</body>
</html>
