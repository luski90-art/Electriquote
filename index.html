<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectriQuote Pro - Acceso Autorizado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s; }
        .active-tab { color: #0f172a; border-top: 3px solid #0f172a; background: #f1f5f9; }
        .dark .active-tab { color: #f8fafc; border-top: 3px solid #38bdf8; background: #1e293b; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0f172a; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        .dark .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen pb-24 text-slate-800 bg-slate-50 dark:bg-darkBg dark:text-slate-100">

<!-- PANTALLA DE ACCESO -->
<div id="auth-screen" class="fixed inset-0 bg-slate-900 z-[999] flex flex-col items-center justify-center p-4">
    <div class="bg-white dark:bg-darkCard w-full max-w-sm rounded-[2.5rem] shadow-2xl p-10 fade-in text-center">
        <div class="bg-slate-900 dark:bg-blue-600 w-16 h-16 rounded-2xl text-white flex items-center justify-center mx-auto mb-6">
            <i data-lucide="shield-check" class="w-8 h-8"></i>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white">Acceso Privado</h2>
        <p class="text-slate-500 text-sm mt-2 mb-8">Usa tu cuenta para gestionar presupuestos</p>
        
        <div class="space-y-3">
            <input id="usr-fld" type="email" placeholder="Email" class="w-full p-4 border border-slate-200 dark:border-slate-700 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 ring-slate-900 transition-all">
            <input id="key-fld" type="password" placeholder="Contraseña" class="w-full p-4 border border-slate-200 dark:border-slate-700 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 ring-slate-900 transition-all">
        </div>
        
        <p id="auth-error-msg" class="text-red-500 text-xs mt-4 font-bold hidden"></p>

        <div class="flex flex-col gap-3 mt-6">
            <button id="btn-action-login" onclick="window.processAuth()" class="w-full py-4 bg-slate-900 dark:bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-slate-800 flex items-center justify-center gap-2">
                <span>Entrar</span>
            </button>
        </div>
    </div>
</div>

<!-- CABECERA -->
<header class="bg-white dark:bg-darkCard border-b border-slate-200 dark:border-slate-800 p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-3">
        <div class="bg-slate-900 dark:bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="zap" class="w-5 h-5"></i></div>
        <h1 class="text-lg font-black text-slate-900 dark:text-white uppercase tracking-tight">ELECTRIQUOTE</h1>
    </div>
    <div class="flex items-center gap-2">
        <button onclick="window.toggleDarkMode()" class="p-2 text-slate-400 hover:text-blue-500 transition-colors">
            <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
        </button>
        <button onclick="window.doLogout()" class="p-2 text-slate-400 hover:text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-300"></div>
    </div>
</header>

<main class="max-w-4xl mx-auto p-4">
    <!-- BUSCADOR -->
    <div id="search-bar" class="mb-6 flex gap-2">
        <div class="relative flex-1">
            <i data-lucide="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input id="main-search" oninput="window.applyFilters()" type="text" placeholder="Buscar..." class="w-full pl-11 pr-4 py-3 bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm outline-none focus:ring-2 ring-blue-500">
        </div>
        <select id="status-filter" onchange="window.applyFilters()" class="px-4 py-3 bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm outline-none text-sm font-bold">
            <option value="todos">Todos</option>
            <option value="pendiente">Pendientes</option>
            <option value="aprobado">Aprobados</option>
        </select>
    </div>

    <!-- VISTAS -->
    <section id="view-quotes" class="space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold">Proyectos</h2>
            <button onclick="window.openQuoteModal()" class="bg-slate-900 dark:bg-blue-600 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg"><i data-lucide="plus"></i> Nuevo</button>
        </div>
        <div id="quotes-list" class="grid gap-4"></div>
    </section>

    <section id="view-materials" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold">Materiales</h2>
            <button onclick="window.openMaterialModal()" class="bg-slate-900 dark:bg-blue-600 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2"><i data-lucide="plus"></i> Añadir</button>
        </div>
        <div id="materials-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>

    <section id="view-clients" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-extrabold">Clientes</h2>
            <button onclick="window.openClientModal()" class="bg-slate-900 dark:bg-blue-600 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2"><i data-lucide="user-plus"></i> Nuevo</button>
        </div>
        <div id="clients-list" class="grid sm:grid-cols-2 gap-4"></div>
    </section>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-darkCard border-t border-slate-200 dark:border-slate-800 flex justify-around items-center h-20 z-40 shadow-lg">
    <button onclick="window.switchView('quotes')" id="nav-quotes" class="flex-1 flex flex-col items-center justify-center active-tab h-full">
        <i data-lucide="layout-grid" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold">PROYECTOS</span>
    </button>
    <button onclick="window.switchView('materials')" id="nav-materials" class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full">
        <i data-lucide="package" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold">CATÁLOGO</span>
    </button>
    <button onclick="window.switchView('clients')" id="nav-clients" class="flex-1 flex flex-col items-center justify-center text-slate-400 h-full">
        <i data-lucide="users" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold">CLIENTES</span>
    </button>
</nav>

<!-- MODALES (Omitidos los cuerpos por brevedad, se inyectan dinámicamente o se asumen existentes) -->
<div id="modal-client" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[100]">
    <div class="bg-white dark:bg-darkCard w-full max-w-sm rounded-[1.5rem] p-6 space-y-4 shadow-2xl">
        <h3 class="font-black text-xl">Cliente</h3>
        <input id="cl-name" placeholder="Nombre" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        <input id="cl-phone" placeholder="Teléfono" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        <button onclick="window.saveClientData()" class="w-full py-4 bg-slate-900 dark:bg-blue-600 text-white font-bold rounded-xl">Guardar</button>
        <button onclick="window.closeAllModals()" class="w-full text-slate-400 text-sm">Cerrar</button>
    </div>
</div>

<div id="modal-material" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[100]">
    <div class="bg-white dark:bg-darkCard w-full max-w-sm rounded-[1.5rem] p-6 space-y-4 shadow-2xl">
        <h3 class="font-black text-xl">Material</h3>
        <input id="mt-name" placeholder="Nombre" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        <input id="mt-price" type="number" placeholder="Precio (€)" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
        <button onclick="window.saveMaterialData()" class="w-full py-4 bg-slate-900 dark:bg-blue-600 text-white font-bold rounded-xl">Guardar</button>
        <button onclick="window.closeAllModals()" class="w-full text-slate-400 text-sm">Cerrar</button>
    </div>
</div>

<div id="modal-quote" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[100]">
    <div class="bg-white dark:bg-darkCard w-full max-w-xl rounded-[2rem] overflow-hidden flex flex-col max-h-[85vh] shadow-2xl">
        <div class="p-6 border-b dark:border-slate-700 bg-slate-50 dark:bg-slate-800 flex justify-between items-center"><h3 class="font-black text-xl">Proyecto</h3><button onclick="window.closeAllModals()"><i data-lucide="x"></i></button></div>
        <div class="p-6 overflow-y-auto space-y-4 flex-1">
            <input id="q-ref" placeholder="Referencia" class="w-full p-4 border dark:border-slate-700 dark:bg-slate-800 rounded-xl font-bold">
            <select id="q-cl-select" class="w-full p-4 border dark:border-slate-700 dark:bg-slate-800 rounded-xl"></select>
            <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl">
                <div class="flex gap-2 mb-4">
                    <select id="q-mt-select" class="flex-1 p-3 border dark:border-slate-700 dark:bg-slate-800 rounded-xl text-sm"></select>
                    <input id="q-mt-qty" type="number" value="1" class="w-16 p-3 border dark:border-slate-700 dark:bg-slate-800 rounded-xl text-center">
                    <button onclick="window.addItemToQuote()" class="bg-slate-900 dark:bg-blue-600 text-white px-4 rounded-xl"><i data-lucide="plus"></i></button>
                </div>
                <ul id="q-items-list" class="space-y-2 mb-4"></ul>
                <div class="flex justify-between font-black text-lg pt-4 border-t dark:border-slate-700"><span>TOTAL</span><span id="q-total-val">0.00 €</span></div>
            </div>
        </div>
        <div class="p-6 border-t dark:border-slate-700"><button onclick="window.saveFinalQuote()" class="w-full py-4 bg-slate-900 dark:bg-blue-600 text-white font-bold rounded-xl">Guardar</button></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBuX9O3WBR5zX_L-WYdRiwirBl50aUFzlg",
    authDomain: "electriquote-b92c3.firebaseapp.com",
    projectId: "electriquote-b92c3",
    storageBucket: "electriquote-b92c3.firebasestorage.app",
    messagingSenderId: "1050154424016",
    appId: "1:1050154424016:web:10e5250c9b78c17bb7b0d5"
};

const appId = 'electri-pro-v1';
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

setPersistence(auth, browserLocalPersistence).catch(console.error);

let user = null;
window.data = { clients: [], materials: [], quotes: [] };
window.tempItems = [];
window.editingId = null;
window.dbListeners = [];

// --- AUTENTICACIÓN FLEXIBLE (Para que puedas entrar) ---
window.processAuth = async () => {
    const errEl = document.getElementById('auth-error-msg');
    const btn = document.getElementById(`btn-action-login`);
    const email = document.getElementById('usr-fld').value.trim().toLowerCase();
    const pass = document.getElementById('key-fld').value.trim();
    
    if (!email || pass.length < 6) { 
        errEl.innerText = "Email inválido o contraseña muy corta (mín. 6)"; 
        errEl.classList.remove('hidden'); 
        return; 
    }

    errEl.classList.add('hidden');
    btn.innerHTML = `<div class="loading-spinner" style="margin: 0 auto;"></div>`;
    btn.disabled = true;

    try {
        await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
        if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential' || e.code === 'auth/error-internal') {
             try {
                await createUserWithEmailAndPassword(auth, email, pass);
             } catch (createErr) {
                errEl.innerText = "Credenciales incorrectas o error de servidor.";
                errEl.classList.remove('hidden');
             }
        } else {
            errEl.innerText = "Error: " + e.code;
            errEl.classList.remove('hidden');
        }
    } finally {
        btn.innerHTML = `<span>Entrar</span>`;
        btn.disabled = false;
    }
};

window.doLogout = async () => { await signOut(auth); };

// --- UTILIDADES ---
window.toggleDarkMode = () => {
    document.documentElement.classList.toggle('dark');
    const isDark = document.documentElement.classList.contains('dark');
    document.getElementById('theme-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
    lucide.createIcons();
};

window.switchView = (v) => {
    ['quotes','materials','clients'].forEach(x => {
        document.getElementById('view-'+x).classList.add('hidden');
        document.getElementById('nav-'+x).className = "flex-1 flex flex-col items-center justify-center text-slate-400 h-full";
    });
    document.getElementById('view-'+v).classList.remove('hidden');
    document.getElementById('nav-'+v).className = "flex-1 flex flex-col items-center justify-center active-tab h-full";
};

window.closeAllModals = () => {
    document.querySelectorAll('[id^="modal-"]').forEach(m => {
        m.classList.remove('flex'); m.classList.add('hidden');
    });
    window.editingId = null;
};

const syncCol = (name, cb) => {
    if(!user) return () => {}; 
    const path = collection(db, 'artifacts', appId, 'users', user.uid, name);
    return onSnapshot(path, s => {
        window.data[name] = s.docs.map(d => ({id: d.id, ...d.data()}));
        cb();
    }, (err) => console.error(err));
};

// CLIENTES
window.openClientModal = (id = null) => {
    window.editingId = id;
    const item = id ? window.data.clients.find(x => x.id === id) : null;
    document.getElementById('cl-name').value = item ? item.name : '';
    document.getElementById('cl-phone').value = item ? item.phone : '';
    document.getElementById('modal-client').classList.replace('hidden', 'flex');
};
window.saveClientData = async () => {
    const d = { name: document.getElementById('cl-name').value, phone: document.getElementById('cl-phone').value, up: serverTimestamp() };
    if(!d.name) return;
    const c = collection(db, 'artifacts', appId, 'users', user.uid, 'clients');
    window.editingId ? await updateDoc(doc(c, window.editingId), d) : await addDoc(c, d);
    window.closeAllModals();
};

// MATERIALES
window.openMaterialModal = (id = null) => {
    window.editingId = id;
    const item = id ? window.data.materials.find(x => x.id === id) : null;
    document.getElementById('mt-name').value = item ? item.name : '';
    document.getElementById('mt-price').value = item ? item.price : '';
    document.getElementById('modal-material').classList.replace('hidden', 'flex');
};
window.saveMaterialData = async () => {
    const p = parseFloat(document.getElementById('mt-price').value);
    if(isNaN(p)) return;
    const d = { name: document.getElementById('mt-name').value, price: p, up: serverTimestamp() };
    const col = collection(db, 'artifacts', appId, 'users', user.uid, 'materials');
    window.editingId ? await updateDoc(doc(col, window.editingId), d) : await addDoc(col, d);
    window.closeAllModals();
};

// QUOTES
window.openQuoteModal = (id = null) => {
    if(window.data.clients.length === 0) return alert("Crea un cliente primero");
    window.editingId = id;
    document.getElementById('q-cl-select').innerHTML = window.data.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    document.getElementById('q-mt-select').innerHTML = window.data.materials.map(m => `<option value="${m.id}">${m.name} (${m.price.toFixed(2)}€)</option>`).join('');
    if(id) {
        const q = window.data.quotes.find(x => x.id === id);
        document.getElementById('q-ref').value = q.ref;
        document.getElementById('q-cl-select').value = q.clientId;
        window.tempItems = [...q.items];
    } else {
        window.tempItems = []; document.getElementById('q-ref').value = "";
    }
    window.renderQuoteList();
    document.getElementById('modal-quote').classList.replace('hidden', 'flex');
};
window.addItemToQuote = () => {
    const m = window.data.materials.find(x => x.id === document.getElementById('q-mt-select').value);
    const qty = parseInt(document.getElementById('q-mt-qty').value);
    if(m && qty > 0) { window.tempItems.push({...m, qty, sub: m.price*qty}); window.renderQuoteList(); }
};
window.renderQuoteList = () => {
    const list = document.getElementById('q-items-list');
    let sub = 0;
    list.innerHTML = window.tempItems.map((it, i) => {
        sub += it.sub;
        return `<li class="flex justify-between p-2 bg-white dark:bg-slate-700 rounded border dark:border-slate-600 text-xs"><span>${it.qty}x ${it.name}</span><b>${it.sub.toFixed(2)}€</b></li>`;
    }).join('');
    document.getElementById('q-total-val').innerText = sub.toFixed(2)+"€";
};
window.saveFinalQuote = async () => {
    const r = document.getElementById('q-ref').value, c = document.getElementById('q-cl-select').value;
    if(!r || window.tempItems.length === 0) return;
    const sub = window.tempItems.reduce((a,b)=>a+b.sub,0);
    const col = collection(db, 'artifacts', appId, 'users', user.uid, 'quotes');
    const d = { ref: r, clientId: c, status: 'pendiente', items: window.tempItems, total: sub, date: serverTimestamp() };
    window.editingId ? await updateDoc(doc(col, window.editingId), d) : await addDoc(col, d);
    window.closeAllModals();
};

window.applyFilters = () => { renderCls(); renderMats(); renderQts(); };

const renderCls = () => {
    const s = document.getElementById('main-search').value.toLowerCase();
    document.getElementById('clients-list').innerHTML = window.data.clients.filter(c => c.name.toLowerCase().includes(s)).map(c => `<div onclick="window.openClientModal('${c.id}')" class="bg-white dark:bg-darkCard p-4 rounded-xl border dark:border-slate-700 cursor-pointer"><b>${c.name}</b><p class="text-[10px] text-slate-400">${c.phone}</p></div>`).join('');
};
const renderMats = () => {
    const s = document.getElementById('main-search').value.toLowerCase();
    document.getElementById('materials-list').innerHTML = window.data.materials.filter(m => m.name.toLowerCase().includes(s)).map(m => `<div onclick="window.openMaterialModal('${m.id}')" class="bg-white dark:bg-darkCard p-4 rounded-xl border dark:border-slate-700 cursor-pointer"><b>${m.name}</b><p class="text-blue-500 font-bold">${m.price.toFixed(2)}€</p></div>`).join('');
};
const renderQts = () => {
    const s = document.getElementById('main-search').value.toLowerCase(), f = document.getElementById('status-filter').value;
    document.getElementById('quotes-list').innerHTML = window.data.quotes.filter(q => (q.ref.toLowerCase().includes(s)) && (f === 'todos' || q.status === f)).map(q => `<div onclick="window.openQuoteModal('${q.id}')" class="bg-white dark:bg-darkCard p-4 rounded-2xl border-l-4 border-slate-900 dark:border-blue-600 shadow-sm flex justify-between items-center cursor-pointer"><div><b>${q.ref}</b><p class="text-[10px] text-slate-500 uppercase">${q.status}</p></div><div class="text-right"><b>${q.total.toFixed(2)}€</b></div></div>`).join('');
    lucide.createIcons();
};

onAuthStateChanged(auth, u => {
    user = u;
    window.dbListeners.forEach(unsub => unsub());
    if(u) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-emerald-500";
        window.dbListeners.push(syncCol('clients', renderCls));
        window.dbListeners.push(syncCol('materials', renderMats));
        window.dbListeners.push(syncCol('quotes', renderQts));
    } else {
        document.getElementById('auth-screen').classList.replace('hidden', 'flex');
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-slate-300";
    }
});
lucide.createIcons();
</script>
</body>
</html>
